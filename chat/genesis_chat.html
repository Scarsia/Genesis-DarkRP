<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --font-ui:   'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --accent:    #c8cbd6;
  --muted:     rgba(200,203,214,0.4);
  --shadow:    0 1px 3px rgba(0,0,0,0.7);
  --c-say:    #d6d9e0;
  --c-me:     #7eb8d4;
  --c-it:     #b09fd4;
  --c-do:     #7ec4a0;
  --c-ooc:    #c4b87e;
  --c-w:      #c47e7e;
  --c-advert: #c4a07e;
  --c-system: #888a8f;
}

html, body {
  width: 100%; height: 100%;
  background: transparent;
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
}

/* ── FEED : messages flottants top-left ── */
#feed {
  position: fixed;
  top: 14px;
  left: 14px;
  width: 460px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  pointer-events: none;
}

.msg {
  display: flex;
  align-items: baseline;
  gap: 0;
  opacity: 1;
  transition: opacity 1.2s ease;
  line-height: 1.45;
  padding: 1px 0;
}

.msg.fade { opacity: 0; }

/* texte avec ombre portée pour lisibilité sur fond de jeu */
.msg * { text-shadow: var(--shadow); }

.msg-time {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 400;
  color: var(--muted);
  margin-right: 8px;
  flex-shrink: 0;
  letter-spacing: 0;
}

.msg-tag {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 1px 5px;
  border-radius: 2px;
  margin-right: 6px;
  flex-shrink: 0;
}

.msg-name {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  margin-right: 5px;
  flex-shrink: 0;
}

.msg-sep {
  font-size: 13px;
  color: var(--muted);
  margin-right: 5px;
  flex-shrink: 0;
}

.msg-text {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 400;
  color: var(--c-say);
  flex: 1;
  min-width: 0;
  word-break: break-word;
}

/* types */
.t-me   .msg-tag  { background: rgba(126,184,212,0.18); color: var(--c-me); }
.t-me   .msg-name { color: var(--c-me); }
.t-me   .msg-text { color: var(--c-me); font-style: italic; }

.t-it   .msg-name { display:none; }
.t-it   .msg-sep  { display:none; }
.t-it   .msg-tag  { background: rgba(176,159,212,0.18); color: var(--c-it); }
.t-it   .msg-text { color: var(--c-it); font-style: italic; }

.t-do   .msg-tag  { background: rgba(126,196,160,0.18); color: var(--c-do); }
.t-do   .msg-name { color: var(--c-do); }
.t-do   .msg-text { color: var(--c-do); }

.t-ooc  .msg-tag  { background: rgba(196,184,126,0.18); color: var(--c-ooc); }
.t-ooc  .msg-name { color: var(--c-ooc); }
.t-ooc  .msg-text { color: var(--c-ooc); }

.t-w    .msg-tag  { background: rgba(196,126,126,0.18); color: var(--c-w); }
.t-w    .msg-name { color: var(--c-w); }
.t-w    .msg-text { color: var(--c-w); font-style: italic; }

.t-advert .msg-tag  { background: rgba(196,160,126,0.18); color: var(--c-advert); }
.t-advert .msg-name { color: var(--c-advert); }
.t-advert .msg-text { color: var(--c-advert); font-weight: 500; }

.t-system .msg-tag  { display:none; }
.t-system .msg-name { display:none; }
.t-system .msg-sep  { display:none; }
.t-system .msg-text { color: var(--c-system); font-style: italic; font-size: 11px; }
.t-system .msg-time { opacity: 0.6; }

/* ── INPUT BAR ── */
#input-area {
  position: fixed;
  bottom: 18px;
  left: 14px;
  width: 460px;
  display: flex;
  align-items: center;
  gap: 8px;
}

#type-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 0 11px;
  height: 42px;
  background: rgba(10,12,16,0.82);
  border: 1px solid rgba(200,203,214,0.14);
  border-radius: 21px;
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--accent);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s, border-color .15s;
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
}
#type-pill:hover { background: rgba(20,24,30,0.9); border-color: rgba(200,203,214,0.25); }
.pdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

#inp-wrap {
  flex: 1;
  height: 42px;
  background: rgba(10,12,16,0.82);
  border: 1px solid rgba(200,203,214,0.14);
  border-radius: 21px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  transition: border-color .15s;
}
#inp-wrap:focus-within { border-color: rgba(200,203,214,0.28); }

#inp {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 400;
  color: var(--accent);
  min-width: 0;
}
#inp::placeholder { color: var(--muted); }

#send {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: rgba(10,12,16,0.82);
  border: 1px solid rgba(200,203,214,0.14);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  color: var(--muted);
  transition: background .15s, color .15s;
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
}
#send:hover { background: rgba(30,35,45,0.92); color: var(--accent); }
#send svg { width: 14px; height: 14px; fill: currentColor; }

/* ── DROPDOWN ── */
#dd {
  position: fixed;
  bottom: 64px;
  left: 14px;
  width: 220px;
  background: rgba(10,12,16,0.94);
  border: 1px solid rgba(200,203,214,0.18);
  border-radius: 8px;
  overflow: hidden;
  display: none;
  flex-direction: column;
  z-index: 100;
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
#dd.open { display: flex; }

.dd-title {
  padding: 8px 12px 6px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.dd-opt {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 12px;
  cursor: pointer;
  transition: background .1s;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.dd-opt:last-child { border-bottom: none; }
.dd-opt:hover { background: rgba(255,255,255,0.05); }
.dd-opt.sel { background: rgba(200,203,214,0.07); }
.dd-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dd-cmd {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  min-width: 54px;
}
.dd-desc { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<div id="feed"></div>

<div id="dd">
  <div class="dd-title">Type de message</div>
</div>

<div id="input-area">
  <button id="type-pill" onclick="togDD()">
    <span class="pdot" id="pdot"></span>
    <span id="plabel">/say</span>
  </button>
  <div id="inp-wrap">
    <input id="inp" placeholder="Envoyez un message ..." maxlength="250"
      onkeydown="onKey(event)" oninput="onInput(event)" />
  </div>
  <button id="send" onclick="doSend()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
const TYPES = [
  {id:'say',    cmd:'/say',    label:'/say',    desc:'Dialogue normal',   color:'#c8cbd6'},
  {id:'me',     cmd:'/me',     label:'/me',     desc:'Action (3e pers.)', color:'#7eb8d4'},
  {id:'it',     cmd:'/it',     label:'/it',     desc:'Narration',         color:'#b09fd4'},
  {id:'do',     cmd:'/do',     label:'/do',     desc:'Description scène', color:'#7ec4a0'},
  {id:'ooc',    cmd:'/ooc',    label:'/ooc',    desc:'Hors personnage',   color:'#c4b87e'},
  {id:'w',      cmd:'/w',      label:'/w',      desc:'Chuchotement',      color:'#c47e7e'},
  {id:'advert', cmd:'/advert', label:'/advert', desc:'Publicité',         color:'#c4a07e'},
];
const TAGS = { say:'SAY', me:'ME', it:'IT', do:'DO', ooc:'OOC', w:'MURMURE', advert:'ANNONCE' };

let cType = TYPES[0];
let ddOpen = false;

// Build dropdown
const ddEl = document.getElementById('dd');
TYPES.forEach(t => {
  const el = document.createElement('div');
  el.className = 'dd-opt' + (t.id === 'say' ? ' sel' : '');
  el.dataset.id = t.id;
  el.innerHTML = `<span class="dd-dot" style="background:${t.color}"></span><span class="dd-cmd">${t.label}</span><span class="dd-desc">${t.desc}</span>`;
  el.onclick = () => selType(t);
  ddEl.appendChild(el);
});

function selType(t) {
  cType = t;
  document.getElementById('pdot').style.background = t.color;
  document.getElementById('plabel').textContent = t.label;
  document.querySelectorAll('.dd-opt').forEach(e => e.classList.toggle('sel', e.dataset.id === t.id));
  closDD();
  document.getElementById('inp').focus();
}

function togDD() { ddOpen ? closDD() : openDD(); }
function openDD() { ddOpen = true; ddEl.classList.add('open'); }
function closDD() { ddOpen = false; ddEl.classList.remove('open'); }
document.addEventListener('click', e => {
  if (ddOpen && !e.target.closest('#type-pill') && !e.target.closest('#dd')) closDD();
});

// Feed
const feed = document.getElementById('feed');
const MSG_LIFETIME = 14000; // ms avant fade
const MSG_MAX = 20;
const msgTimers = new Map();

function gTime() {
  const n = new Date();
  return String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}

function addMsg(m) {
  const d = document.createElement('div');
  d.className = 'msg t-' + (m.type || 'say');

  const tm = document.createElement('span');
  tm.className = 'msg-time';
  tm.textContent = m.time;
  d.appendChild(tm);

  const type = m.type || 'say';
  if (type !== 'say' && type !== 'system') {
    const tag = document.createElement('span');
    tag.className = 'msg-tag';
    tag.textContent = TAGS[type] || type.toUpperCase();
    d.appendChild(tag);
  }

  if (m.name && type !== 'it' && type !== 'system') {
    const nm = document.createElement('span');
    nm.className = 'msg-name';
    nm.textContent = m.name;
    d.appendChild(nm);
    const sep = document.createElement('span');
    sep.className = 'msg-sep';
    sep.textContent = type === 'say' ? ':' : '';
    d.appendChild(sep);
  }

  const tx = document.createElement('span');
  tx.className = 'msg-text';
  tx.textContent = m.text;
  d.appendChild(tx);

  feed.appendChild(d);

  // Limit max messages
  while (feed.children.length > MSG_MAX) {
    const old = feed.children[0];
    if (msgTimers.has(old)) { clearTimeout(msgTimers.get(old)); msgTimers.delete(old); }
    feed.removeChild(old);
  }

  // Auto-fade & remove
  const fadeT = setTimeout(() => {
    d.classList.add('fade');
    setTimeout(() => { if (d.parentNode) feed.removeChild(d); msgTimers.delete(d); }, 1200);
  }, MSG_LIFETIME);
  msgTimers.set(d, fadeT);
}

function doSend() {
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = '';
  addMsg({ type: cType.id, name: 'Vous', time: gTime(), text: txt });
}

function onKey(e) {
  if (e.key === 'Enter') doSend();
  if (e.key === 'Escape') closDD();
}

function onInput(e) {
  const v = e.target.value;
  if (v.startsWith('/')) {
    const cmd = v.split(' ')[0].toLowerCase();
    const found = TYPES.find(t => t.cmd.toLowerCase() === cmd);
    if (found) { e.target.value = v.slice(cmd.length).trimStart(); selType(found); }
  }
}

selType(TYPES[0]);

// Seed démo
setTimeout(() => {
  const demo = [
    {type:'system', name:'', time:'00:38', text:'Connexion au serveur Genesis Network.'},
    {type:'say',    name:'Yura Sabaku',     time:'00:39', text:'Retire son chapeau.'},
    {type:'me',     name:'Yura Sabaku',     time:'00:39', text:'lui donne son bras.'},
    {type:'me',     name:'Junko Shirogane', time:'00:40', text:'examine sa main et en particulier ses doigts, ses ongles.'},
    {type:'me',     name:'Junko Shirogane', time:'00:41', text:'dépose sa main froide et rugueuse sur le visage de cette dernière.'},
    {type:'ooc',    name:'NekoSan',         time:'00:41', text:'Je reviens dans 2 min.'},
    {type:'it',     name:'',                time:'00:42', text:"Le vent froid s'engouffre dans la ruelle, faisant trembler les néons."},
    {type:'advert', name:'Genesis Radio',   time:'00:42', text:'Nouveau stock — Dealership Route 66, ouvert 24h/24.'},
  ];
  demo.forEach((m, i) => setTimeout(() => addMsg(m), i * 180));
}, 200);
</script>
</body>
</html>
