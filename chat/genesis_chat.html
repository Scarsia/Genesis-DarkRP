<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --font-ui:   'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --accent:    #c8cbd6;
  --muted:     rgba(200,203,214,0.4);
  --shadow:    0 1px 3px rgba(0,0,0,0.7);
  --c-say:    #d6d9e0;
  --c-me:     #7eb8d4;
  --c-it:     #b09fd4;
  --c-do:     #7ec4a0;
  --c-ooc:    #c4b87e;
  --c-w:      #c47e7e;
  --c-advert: #c4a07e;
  --c-system: #888a8f;
}

html, body {
  width: 100%; height: 100%;
  background: transparent;
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
}

/* ── FEED : messages flottants top-left ── */
#feed {
  position: fixed;
  top: 14px;
  left: 14px;
  width: 460px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  pointer-events: none;
}

.msg {
  display: flex;
  align-items: baseline;
  gap: 0;
  opacity: 1;
  transition: opacity 1.2s ease;
  line-height: 1.45;
  padding: 1px 0;
}

.msg.fade { opacity: 0; }

/* texte avec ombre portée pour lisibilité sur fond de jeu */
.msg * { text-shadow: var(--shadow); }

.msg-time {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 400;
  color: var(--muted);
  margin-right: 8px;
  flex-shrink: 0;
  letter-spacing: 0;
}

.msg-tag {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 1px 5px;
  border-radius: 2px;
  margin-right: 6px;
  flex-shrink: 0;
}

.msg-name {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  margin-right: 5px;
  flex-shrink: 0;
}

.msg-sep {
  font-size: 13px;
  color: var(--muted);
  margin-right: 5px;
  flex-shrink: 0;
}

.msg-text {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 400;
  color: var(--c-say);
  flex: 1;
  min-width: 0;
  word-break: break-word;
}

/* types */
.t-me   .msg-tag  { background: rgba(126,184,212,0.18); color: var(--c-me); }
.t-me   .msg-name { color: var(--c-me); }
.t-me   .msg-text { color: var(--c-me); font-style: italic; }

.t-it   .msg-name { display:none; }
.t-it   .msg-sep  { display:none; }
.t-it   .msg-tag  { background: rgba(176,159,212,0.18); color: var(--c-it); }
.t-it   .msg-text { color: var(--c-it); font-style: italic; }

.t-do   .msg-tag  { background: rgba(126,196,160,0.18); color: var(--c-do); }
.t-do   .msg-name { color: var(--c-do); }
.t-do   .msg-text { color: var(--c-do); }

.t-ooc  .msg-tag  { background: rgba(196,184,126,0.18); color: var(--c-ooc); }
.t-ooc  .msg-name { color: var(--c-ooc); }
.t-ooc  .msg-text { color: var(--c-ooc); }

.t-w    .msg-tag  { background: rgba(196,126,126,0.18); color: var(--c-w); }
.t-w    .msg-name { color: var(--c-w); }
.t-w    .msg-text { color: var(--c-w); font-style: italic; }

.t-advert .msg-tag  { background: rgba(196,160,126,0.18); color: var(--c-advert); }
.t-advert .msg-name { color: var(--c-advert); }
.t-advert .msg-text { color: var(--c-advert); font-weight: 500; }

.t-system .msg-tag  { display:none; }
.t-system .msg-name { display:none; }
.t-system .msg-sep  { display:none; }
.t-system .msg-text { color: var(--c-system); font-style: italic; font-size: 11px; }
.t-system .msg-time { opacity: 0.6; }

/* ── INPUT BAR ── */
#input-area {
  position: fixed;
  bottom: 18px;
  left: 14px;
  width: 460px;
  display: none;           /* -- WLC FIX: caché par défaut, openChat() l'affiche -- */
  align-items: center;
  gap: 8px;
}
#input-area.open { display: flex; }   /* -- WLC FIX -- */

#type-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 0 11px;
  height: 42px;
  background: rgba(10,12,16,0.82);
  border: 1px solid rgba(200,203,214,0.14);
  border-radius: 21px;
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--accent);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s, border-color .15s;
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
}
#type-pill:hover { background: rgba(20,24,30,0.9); border-color: rgba(200,203,214,0.25); }
.pdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

#inp-wrap {
  flex: 1;
  height: 42px;
  background: rgba(10,12,16,0.82);
  border: 1px solid rgba(200,203,214,0.14);
  border-radius: 21px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  transition: border-color .15s;
}
#inp-wrap:focus-within { border-color: rgba(200,203,214,0.28); }

#inp {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 400;
  color: var(--accent);
  min-width: 0;
}
#inp::placeholder { color: var(--muted); }

#send {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: rgba(10,12,16,0.82);
  border: 1px solid rgba(200,203,214,0.14);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  color: var(--muted);
  transition: background .15s, color .15s;
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
}
#send:hover { background: rgba(30,35,45,0.92); color: var(--accent); }
#send svg { width: 14px; height: 14px; fill: currentColor; }

/* ── DROPDOWN ── */
#dd {
  position: fixed;
  bottom: 64px;
  left: 14px;
  width: 220px;
  background: rgba(10,12,16,0.94);
  border: 1px solid rgba(200,203,214,0.18);
  border-radius: 8px;
  overflow: hidden;
  display: none;
  flex-direction: column;
  z-index: 100;
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
#dd.open { display: flex; }

.dd-title {
  padding: 8px 12px 6px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.dd-opt {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 12px;
  cursor: pointer;
  transition: background .1s;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.dd-opt:last-child { border-bottom: none; }
.dd-opt:hover { background: rgba(255,255,255,0.05); }
.dd-opt.sel { background: rgba(200,203,214,0.07); }
.dd-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dd-cmd {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  min-width: 54px;
}
.dd-desc { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<div id="feed"></div>

<div id="dd">
  <div class="dd-title">Type de message</div>
</div>

<div id="input-area">
  <button id="type-pill" onclick="togDD()">
    <span class="pdot" id="pdot"></span>
    <span id="plabel">/say</span>
  </button>
  <div id="inp-wrap">
    <input id="inp" placeholder="Envoyez un message ..." maxlength="250"
      onkeydown="onKey(event)" oninput="onInput(event)" />
  </div>
  <button id="send" onclick="doSend()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
var TYPES = [
  {id:'say',    cmd:'/say',    label:'/say',    desc:'Dialogue normal',   color:'#c8cbd6'},
  {id:'me',     cmd:'/me',     label:'/me',     desc:'Action (3e pers.)', color:'#7eb8d4'},
  {id:'it',     cmd:'/it',     label:'/it',     desc:'Narration',         color:'#b09fd4'},
  {id:'do',     cmd:'/do',     label:'/do',     desc:'Description scène', color:'#7ec4a0'},
  {id:'ooc',    cmd:'/ooc',    label:'/ooc',    desc:'Hors personnage',   color:'#c4b87e'},
  {id:'w',      cmd:'/w',      label:'/w',      desc:'Chuchotement',      color:'#c47e7e'},
  {id:'advert', cmd:'/advert', label:'/advert', desc:'Publicité',         color:'#c4a07e'}
];
var TAGS = { say:'SAY', me:'ME', it:'IT', 'do':'DO', ooc:'OOC', w:'MURMURE', advert:'ANNONCE' };

var cType = TYPES[0];
var ddOpen = false;
var chatOpen = false;   // -- WLC FIX: état du chat --

// Build dropdown
var ddEl = document.getElementById('dd');
TYPES.forEach(function(t) {
  var el = document.createElement('div');
  el.className = 'dd-opt' + (t.id === 'say' ? ' sel' : '');
  el.setAttribute('data-id', t.id);
  el.innerHTML = '<span class="dd-dot" style="background:' + t.color + '"></span><span class="dd-cmd">' + t.label + '</span><span class="dd-desc">' + t.desc + '</span>';
  el.onclick = function() { selType(t); };
  ddEl.appendChild(el);
});

function selType(t) {
  cType = t;
  document.getElementById('pdot').style.background = t.color;
  document.getElementById('plabel').textContent = t.label;
  var opts = document.querySelectorAll('.dd-opt');
  for (var i = 0; i < opts.length; i++) {
    if (opts[i].getAttribute('data-id') === t.id) {
      opts[i].classList.add('sel');
    } else {
      opts[i].classList.remove('sel');
    }
  }
  closDD();
  document.getElementById('inp').focus();
}

function togDD() { ddOpen ? closDD() : openDD(); }
function openDD() { ddOpen = true; ddEl.classList.add('open'); }
function closDD() { ddOpen = false; ddEl.classList.remove('open'); }
document.addEventListener('click', function(e) {
  if (ddOpen && !e.target.closest('#type-pill') && !e.target.closest('#dd')) closDD();
});

// ═══════════════════════════════════════
// WLC FIX: openChat / closeChat — appelés par le Lua
// ═══════════════════════════════════════
function openChat() {
  chatOpen = true;
  document.getElementById('input-area').classList.add('open');
  // Réinitialiser le type à /say à chaque ouverture
  selType(TYPES[0]);
  var inp = document.getElementById('inp');
  inp.value = '';
  inp.focus();
  // Annuler le fade des messages existants pour qu'on les voie pendant qu'on écrit
  cancelAllFades();
}

function closeChat() {
  chatOpen = false;
  document.getElementById('input-area').classList.remove('open');
  closDD();
  document.getElementById('inp').value = '';
  document.getElementById('inp').blur();
  // Relancer les fades pour les messages visibles
  restartFades();
}

// ═══════════════════════════════════════
// WLC FIX: add() — appelé par PushToHTML côté Lua
// Signature : add({type, name, time, text, color})
// ═══════════════════════════════════════
function add(m) {
  addMsg(m);
}

// Feed
var feed = document.getElementById('feed');
var MSG_LIFETIME = 14000; // ms avant fade
var MSG_MAX = 60;
var msgTimers = [];  // [{el, timerId}]

function gTime() {
  var n = new Date();
  return String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}

// -- WLC FIX: annuler les fades quand le chat est ouvert --
function cancelAllFades() {
  for (var i = 0; i < msgTimers.length; i++) {
    if (msgTimers[i].timerId) {
      clearTimeout(msgTimers[i].timerId);
      msgTimers[i].timerId = null;
    }
    msgTimers[i].el.classList.remove('fade');
    msgTimers[i].el.style.opacity = '1';
  }
}

function restartFades() {
  for (var i = 0; i < msgTimers.length; i++) {
    (function(entry) {
      if (!entry.timerId && entry.el.parentNode) {
        entry.timerId = setTimeout(function() {
          entry.el.classList.add('fade');
          setTimeout(function() {
            if (entry.el.parentNode) feed.removeChild(entry.el);
            removeMsgTimer(entry.el);
          }, 1200);
        }, 3000); // court délai après fermeture
      }
    })(msgTimers[i]);
  }
}

function removeMsgTimer(el) {
  for (var i = msgTimers.length - 1; i >= 0; i--) {
    if (msgTimers[i].el === el) {
      msgTimers.splice(i, 1);
      break;
    }
  }
}

function addMsg(m) {
  var d = document.createElement('div');
  var type = m.type || 'say';
  d.className = 'msg t-' + type;

  var tm = document.createElement('span');
  tm.className = 'msg-time';
  tm.textContent = m.time || gTime();
  d.appendChild(tm);

  if (type !== 'say' && type !== 'system') {
    var tag = document.createElement('span');
    tag.className = 'msg-tag';
    tag.textContent = TAGS[type] || type.toUpperCase();
    d.appendChild(tag);
  }

  if (m.name && type !== 'it' && type !== 'system') {
    var nm = document.createElement('span');
    nm.className = 'msg-name';
    // -- WLC FIX: appliquer la couleur du joueur si fournie --
    if (m.color) nm.style.color = m.color;
    nm.textContent = m.name;
    d.appendChild(nm);
    var sep = document.createElement('span');
    sep.className = 'msg-sep';
    sep.textContent = type === 'say' ? ':' : '';
    d.appendChild(sep);
  }

  var tx = document.createElement('span');
  tx.className = 'msg-text';
  tx.textContent = m.text || '';
  d.appendChild(tx);

  feed.appendChild(d);

  // Limit max messages
  while (feed.children.length > MSG_MAX) {
    var old = feed.children[0];
    removeMsgTimer(old);
    feed.removeChild(old);
  }

  // Auto-fade & remove (sauf si chat ouvert)
  var entry = { el: d, timerId: null };

  if (!chatOpen) {
    entry.timerId = setTimeout(function() {
      d.classList.add('fade');
      setTimeout(function() {
        if (d.parentNode) feed.removeChild(d);
        removeMsgTimer(d);
      }, 1200);
    }, MSG_LIFETIME);
  }

  msgTimers.push(entry);
}

// ═══════════════════════════════════════
// WLC FIX: doSend bridge vers Lua via GChat.Send
// ═══════════════════════════════════════
function doSend() {
  var inp = document.getElementById('inp');
  var txt = inp.value.trim();
  inp.value = '';

  if (!txt) {
    // Texte vide → juste fermer le chat
    if (typeof GChat !== 'undefined' && GChat.Close) {
      GChat.Close();
    }
    return;
  }

  // Prépend la commande si ce n'est pas /say
  var fullText = txt;
  if (cType.id !== 'say') {
    fullText = cType.cmd + ' ' + txt;
  }

  // Envoyer au serveur via le bridge Lua
  if (typeof GChat !== 'undefined' && GChat.Send) {
    GChat.Send(cType.id, fullText);
  }
}

function onKey(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    doSend();
  }
  if (e.key === 'Escape') {
    e.preventDefault();
    closDD();
    // -- WLC FIX: Escape ferme le chat via Lua --
    if (typeof GChat !== 'undefined' && GChat.Close) {
      GChat.Close();
    }
  }
}

function onInput(e) {
  var v = e.target.value;
  if (v.startsWith('/')) {
    var cmd = v.split(' ')[0].toLowerCase();
    var found = null;
    for (var i = 0; i < TYPES.length; i++) {
      if (TYPES[i].cmd.toLowerCase() === cmd) { found = TYPES[i]; break; }
    }
    if (found) {
      e.target.value = v.slice(cmd.length).trimStart();
      selType(found);
    }
  }
}

selType(TYPES[0]);
</script>
</body>
</html>
