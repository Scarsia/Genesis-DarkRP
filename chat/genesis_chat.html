<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --font-ui:   'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --accent:    #c8cbd6;
  --muted:     rgba(200,203,214,0.4);
  --shadow:    0 1px 3px rgba(0,0,0,0.7);

  /* type colors */
  --c-say:     #d6d9e0;
  --c-me:      #7eb8d4;
  --c-it:      #b09fd4;
  --c-do:      #7ec4a0;
  --c-ooc:     #8a8d94;
  --c-w:       #c47e7e;
  --c-y:       #e8d44d;
  --c-advert:  #d4a04e;
  --c-team:    #4db8a4;
  --c-radio:   #5b8dd9;
  --c-admin:   #d45b5b;
  --c-pm:      #a07ed4;
  --c-dead:    #d45b5b;
  --c-system:  #6a6d74;
}

html, body {
  width: 100%; height: 100%;
  background: transparent;
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════ */
/* FEED                                  */
/* ══════════════════════════════════════ */
#feed {
  position: fixed;
  top: 14px;
  left: 14px;
  width: 530px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  pointer-events: none;
}

.msg {
  display: flex;
  align-items: baseline;
  gap: 0;
  opacity: 1;
  transition: opacity 1.2s ease;
  line-height: 1.5;
  padding: 3px 8px 3px 0;
  border-radius: 3px;
  background: transparent;
}
.msg.fade { opacity: 0; }
.msg * { text-shadow: var(--shadow); }

.msg-tag {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 1px 7px;
  border-radius: 2px;
  margin-right: 7px;
  margin-left: 4px;
  flex-shrink: 0;
  white-space: nowrap;
}

.msg-name {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  margin-right: 0;
  flex-shrink: 0;
}

.msg-sep {
  font-size: 13px;
  color: var(--muted);
  margin-right: 5px;
  flex-shrink: 0;
}

.msg-text {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 400;
  color: var(--c-say);
  flex: 1;
  min-width: 0;
  word-break: break-word;
}

.msg-time {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 400;
  color: rgba(200,203,214,0.35);
  margin-left: 10px;
  flex-shrink: 0;
  letter-spacing: 0;
}

/* ══════════════════════════════════════ */
/* TYPE STYLES                           */
/* ══════════════════════════════════════ */

/* SAY — pas de badge */
.t-say .msg-tag  { display: none; }
.t-say .msg-sep  { margin-left: 4px; }

/* ME */
.t-me .msg-tag   { background: rgba(126,184,212,0.15); color: var(--c-me); }
.t-me .msg-name  { color: var(--c-me); }
.t-me .msg-text  { color: var(--c-me); font-style: italic; }
.t-me .msg-sep   { display: none; }

/* IT */
.t-it .msg-tag   { background: rgba(176,159,212,0.15); color: var(--c-it); }
.t-it .msg-name  { display: none; }
.t-it .msg-sep   { display: none; }
.t-it .msg-text  { color: var(--c-it); font-style: italic; }

/* DO */
.t-do .msg-tag   { background: rgba(126,196,160,0.15); color: var(--c-do); }
.t-do .msg-name  { color: var(--c-do); }
.t-do .msg-text  { color: var(--c-do); }

/* OOC */
.t-ooc .msg-tag  { background: rgba(138,141,148,0.18); color: var(--c-ooc); }
.t-ooc .msg-text { color: rgba(200,203,214,0.7); }

/* WHISPER */
.t-w .msg-tag    { background: rgba(196,126,126,0.15); color: var(--c-w); }
.t-w .msg-name   { color: var(--c-w); }
.t-w .msg-text   { color: var(--c-w); font-style: italic; }

/* YELL */
.t-y .msg-tag    { background: rgba(232,212,77,0.15); color: var(--c-y); }
.t-y .msg-name   { color: var(--c-y); }
.t-y .msg-text   { color: var(--c-y); font-weight: 600; }

/* ADVERT / ANNONCE */
.t-advert .msg-tag  { background: rgba(212,160,78,0.18); color: var(--c-advert); }
.t-advert .msg-name { color: var(--c-advert); }
.t-advert .msg-text { color: var(--c-advert); font-weight: 500; }

/* TEAM / EQUIPE */
.t-team .msg-tag  { background: rgba(77,184,164,0.18); color: var(--c-team); }
.t-team .msg-name { color: var(--c-team); }
.t-team .msg-text { color: rgba(77,184,164,0.85); }

/* RADIO */
.t-radio .msg-tag  { background: rgba(91,141,217,0.18); color: var(--c-radio); }
.t-radio .msg-name { color: var(--c-radio); }
.t-radio .msg-text { color: rgba(91,141,217,0.85); }

/* ADMIN */
.t-admin .msg-tag  { background: rgba(212,91,91,0.18); color: var(--c-admin); }
.t-admin .msg-name { color: var(--c-admin); }
.t-admin .msg-text { color: rgba(212,91,91,0.85); }

/* PM */
.t-pm .msg-tag   { background: rgba(160,126,212,0.18); color: var(--c-pm); }
.t-pm .msg-name  { color: var(--c-pm); }
.t-pm .msg-text  { color: rgba(160,126,212,0.85); }

/* DEAD */
.t-dead .msg-tag { background: rgba(212,91,91,0.15); color: var(--c-dead); }

/* SYSTEM / SERVEUR */
.t-system .msg-tag  { background: rgba(106,109,116,0.2); color: var(--c-system); }
.t-system .msg-name { display: none; }
.t-system .msg-sep  { display: none; }
.t-system .msg-text { color: var(--c-system); font-style: italic; font-size: 12px; }

/* ══════════════════════════════════════ */
/* INPUT BAR                             */
/* ══════════════════════════════════════ */
#input-area {
  position: fixed;
  bottom: 18px;
  left: 14px;
  width: 530px;
  display: none;
  align-items: center;
  gap: 8px;
}
#input-area.open { display: flex; }

#type-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 0 11px;
  height: 42px;
  background: rgba(10,12,16,0.82);
  border: 1px solid rgba(200,203,214,0.14);
  border-radius: 21px;
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--accent);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s, border-color .15s;
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
}
#type-pill:hover { background: rgba(20,24,30,0.9); border-color: rgba(200,203,214,0.25); }
#type-pill.hidden { display: none; }
.pdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

#inp-wrap {
  flex: 1;
  height: 42px;
  background: rgba(10,12,16,0.82);
  border: 1px solid rgba(200,203,214,0.14);
  border-radius: 21px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  transition: border-color .15s;
}
#inp-wrap:focus-within { border-color: rgba(200,203,214,0.28); }

#inp {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 400;
  color: var(--accent);
  min-width: 0;
}
#inp::placeholder { color: var(--muted); }

#send {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: rgba(10,12,16,0.82);
  border: 1px solid rgba(200,203,214,0.14);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  color: var(--muted);
  transition: background .15s, color .15s;
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
}
#send:hover { background: rgba(30,35,45,0.92); color: var(--accent); }
#send svg { width: 14px; height: 14px; fill: currentColor; }

/* ══════════════════════════════════════ */
/* DROPDOWN                              */
/* ══════════════════════════════════════ */
#dd {
  position: fixed;
  bottom: 64px;
  left: 14px;
  width: 230px;
  background: rgba(10,12,16,0.94);
  border: 1px solid rgba(200,203,214,0.18);
  border-radius: 8px;
  overflow: hidden;
  display: none;
  flex-direction: column;
  z-index: 100;
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  max-height: 320px;
  overflow-y: auto;
}
#dd.open { display: flex; }

.dd-title {
  padding: 8px 12px 6px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.dd-opt {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 12px;
  cursor: pointer;
  transition: background .1s;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.dd-opt:last-child { border-bottom: none; }
.dd-opt:hover { background: rgba(255,255,255,0.05); }
.dd-opt.sel { background: rgba(200,203,214,0.07); }
.dd-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dd-cmd {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  min-width: 54px;
}
.dd-desc { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<div id="feed"></div>

<div id="dd">
  <div class="dd-title">Type de message</div>
</div>

<div id="input-area">
  <button id="type-pill" onclick="togDD()">
    <span class="pdot" id="pdot"></span>
    <span id="plabel">/say</span>
  </button>
  <div id="inp-wrap">
    <input id="inp" placeholder="Envoyez un message ..." maxlength="250"
      onkeydown="onKey(event)" oninput="onInput(event)" />
  </div>
  <button id="send" onclick="doSend()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
/* ══════════════════════════════════════ */
/* TYPES CONFIG                          */
/* ══════════════════════════════════════ */
var TYPES = [
  {id:'say',    cmd:'/say',    label:'/say',    desc:'Dialogue normal',     color:'#c8cbd6'},
  {id:'me',     cmd:'/me',     label:'/me',     desc:'Action (3e pers.)',   color:'#7eb8d4'},
  {id:'it',     cmd:'/it',     label:'/it',     desc:'Narration',           color:'#b09fd4'},
  {id:'do',     cmd:'/do',     label:'/do',     desc:'Description scene',   color:'#7ec4a0'},
  {id:'ooc',    cmd:'/ooc',    label:'/ooc',    desc:'Hors personnage',     color:'#8a8d94'},
  {id:'w',      cmd:'/w',      label:'/w',      desc:'Chuchotement',        color:'#c47e7e'},
  {id:'y',      cmd:'/y',      label:'/y',      desc:'Crier',               color:'#e8d44d'},
  {id:'advert', cmd:'/advert', label:'/advert', desc:'Annonce publique',    color:'#d4a04e'},
  {id:'radio',  cmd:'/radio',  label:'/radio',  desc:'Radio',               color:'#5b8dd9'},
  {id:'pm',     cmd:'/pm',     label:'/pm',     desc:'Message prive',       color:'#a07ed4'},
  {id:'admin',  cmd:'//',      label:'//',      desc:'Chat admin',          color:'#d45b5b'}
];

var TAGS = {
  say:'',        me:'ME',       it:'NARRATION',  'do':'DO',
  ooc:'OOC',     w:'MURMURE',   y:'CRI',         advert:'ANNONCE',
  team:'EQUIPE', radio:'RADIO', admin:'ADMIN',   pm:'PM',
  dead:'MORT',   system:'SERVEUR'
};

var cType = TYPES[0];
var ddOpen = false;
var chatOpen = false;
var rawMode = false;

/* ══════════════════════════════════════ */
/* DROPDOWN                              */
/* ══════════════════════════════════════ */
var ddEl = document.getElementById('dd');
TYPES.forEach(function(t) {
  var el = document.createElement('div');
  el.className = 'dd-opt' + (t.id === 'say' ? ' sel' : '');
  el.setAttribute('data-id', t.id);
  el.innerHTML = '<span class="dd-dot" style="background:' + t.color + '"></span><span class="dd-cmd">' + t.label + '</span><span class="dd-desc">' + t.desc + '</span>';
  el.onclick = function() { selType(t); };
  ddEl.appendChild(el);
});

function selType(t) {
  cType = t;
  rawMode = false;
  var pill = document.getElementById('type-pill');
  pill.classList.remove('hidden');
  document.getElementById('pdot').style.background = t.color;
  document.getElementById('plabel').textContent = t.label;
  var opts = document.querySelectorAll('.dd-opt');
  for (var i = 0; i < opts.length; i++) {
    if (opts[i].getAttribute('data-id') === t.id) {
      opts[i].classList.add('sel');
    } else {
      opts[i].classList.remove('sel');
    }
  }
  closDD();
  document.getElementById('inp').focus();
}

function setRawMode() {
  rawMode = true;
  document.getElementById('type-pill').classList.add('hidden');
}

function togDD() { ddOpen ? closDD() : openDD(); }
function openDD() { ddOpen = true; ddEl.classList.add('open'); }
function closDD() { ddOpen = false; ddEl.classList.remove('open'); }
document.addEventListener('click', function(e) {
  if (ddOpen && !e.target.closest('#type-pill') && !e.target.closest('#dd')) closDD();
});

/* ══════════════════════════════════════ */
/* OPEN / CLOSE (appeles par Lua)        */
/* ══════════════════════════════════════ */
function openChat() {
  chatOpen = true;
  document.getElementById('input-area').classList.add('open');
  selType(TYPES[0]);
  var inp = document.getElementById('inp');
  inp.value = '';
  inp.focus();
  cancelAllFades();
}

function closeChat() {
  chatOpen = false;
  document.getElementById('input-area').classList.remove('open');
  closDD();
  document.getElementById('inp').value = '';
  document.getElementById('inp').blur();
  rawMode = false;
  document.getElementById('type-pill').classList.remove('hidden');
  restartFades();
}

/* ══════════════════════════════════════ */
/* add() — appele par PushToHTML (Lua)   */
/* ══════════════════════════════════════ */
function add(m) { addMsg(m); }

/* ══════════════════════════════════════ */
/* FEED                                  */
/* ══════════════════════════════════════ */
var feed = document.getElementById('feed');
var MSG_LIFETIME = 14000;
var MSG_MAX = 80;
var msgTimers = [];

function gTime() {
  var n = new Date();
  return String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}

function cancelAllFades() {
  for (var i = 0; i < msgTimers.length; i++) {
    if (msgTimers[i].tid) { clearTimeout(msgTimers[i].tid); msgTimers[i].tid = null; }
    msgTimers[i].el.classList.remove('fade');
    msgTimers[i].el.style.opacity = '1';
  }
}

function restartFades() {
  for (var i = 0; i < msgTimers.length; i++) {
    (function(e) {
      if (!e.tid && e.el.parentNode) {
        e.tid = setTimeout(function() {
          e.el.classList.add('fade');
          setTimeout(function() {
            if (e.el.parentNode) feed.removeChild(e.el);
            rmTimer(e.el);
          }, 1200);
        }, 3000);
      }
    })(msgTimers[i]);
  }
}

function rmTimer(el) {
  for (var i = msgTimers.length - 1; i >= 0; i--) {
    if (msgTimers[i].el === el) { msgTimers.splice(i, 1); break; }
  }
}

function addMsg(m) {
  var type = m.type || 'say';
  var d = document.createElement('div');
  d.className = 'msg t-' + type;

  /* ── TAG badge ── */
  var tagText = TAGS[type];
  if (tagText !== undefined && tagText !== '') {
    var tag = document.createElement('span');
    tag.className = 'msg-tag';
    tag.textContent = tagText;
    d.appendChild(tag);
  }

  /* ── NAME ── */
  if (m.name && type !== 'it' && type !== 'system') {
    var nm = document.createElement('span');
    nm.className = 'msg-name';
    if (m.color) nm.style.color = m.color;
    nm.textContent = m.name;
    d.appendChild(nm);

    var sep = document.createElement('span');
    sep.className = 'msg-sep';
    if (type === 'me' || type === 'do' || type === 'w' || type === 'y') {
      sep.textContent = ' ';
    } else {
      sep.textContent = ' : ';
    }
    d.appendChild(sep);
  }

  /* ── TEXT ── */
  var tx = document.createElement('span');
  tx.className = 'msg-text';
  tx.textContent = m.text || '';
  d.appendChild(tx);

  /* ── TIME (right) ── */
  var tm = document.createElement('span');
  tm.className = 'msg-time';
  tm.textContent = m.time || gTime();
  d.appendChild(tm);

  feed.appendChild(d);

  while (feed.children.length > MSG_MAX) {
    var old = feed.children[0];
    rmTimer(old);
    feed.removeChild(old);
  }

  var entry = { el: d, tid: null };
  if (!chatOpen) {
    entry.tid = setTimeout(function() {
      d.classList.add('fade');
      setTimeout(function() {
        if (d.parentNode) feed.removeChild(d);
        rmTimer(d);
      }, 1200);
    }, MSG_LIFETIME);
  }
  msgTimers.push(entry);
}

/* ══════════════════════════════════════ */
/* SEND                                  */
/* ══════════════════════════════════════ */
function doSend() {
  var inp = document.getElementById('inp');
  var txt = inp.value.trim();
  inp.value = '';

  if (!txt) {
    if (typeof GChat !== 'undefined' && GChat.Close) GChat.Close();
    return;
  }

  var fullText = txt;

  if (rawMode) {
    /* Mode brut : le texte contient deja la commande */
    fullText = txt;
  } else if (cType.id !== 'say') {
    fullText = cType.cmd + ' ' + txt;
  }

  if (typeof GChat !== 'undefined' && GChat.Send) {
    GChat.Send(cType.id, fullText);
  }
}

/* ══════════════════════════════════════ */
/* INPUT HANDLING                        */
/* ══════════════════════════════════════ */
function onKey(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    doSend();
  }
  if (e.key === 'Escape') {
    e.preventDefault();
    closDD();
    if (typeof GChat !== 'undefined' && GChat.Close) GChat.Close();
  }
}

function onInput(e) {
  var v = e.target.value;

  /* Detection des commandes slash en temps reel */
  if (v.length >= 2 && v.charAt(0) === '/') {
    var spaceIdx = v.indexOf(' ');
    var cmdPart = spaceIdx > 0 ? v.substring(0, spaceIdx).toLowerCase() : null;

    if (cmdPart) {
      /* Commande complete (espace apres) */
      var found = null;
      for (var i = 0; i < TYPES.length; i++) {
        if (TYPES[i].cmd.toLowerCase() === cmdPart) { found = TYPES[i]; break; }
      }
      if (found) {
        /* Commande connue → selectionner le type, retirer du texte */
        e.target.value = v.substring(spaceIdx + 1);
        selType(found);
      } else {
        /* Commande inconnue (///, /job, /plainte) → mode brut, pill cachee */
        setRawMode();
      }
    }
  }

  /* Si on efface tout en mode brut → retour normal */
  if (v === '' && rawMode) {
    rawMode = false;
    selType(TYPES[0]);
  }
}

selType(TYPES[0]);
</script>
</body>
</html>
