<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --font-ui:   'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --accent:    #c8cbd6;
  --muted:     rgba(200,203,214,0.4);
  --shadow:    0 1px 3px rgba(0,0,0,0.75);
  --c-say:    #d6d9e0;
  --c-me:     #7eb8d4;
  --c-it:     #b09fd4;
  --c-do:     #7ec4a0;
  --c-ooc:    #c4b87e;
  --c-w:      #c47e7e;
  --c-advert: #c4a07e;
  --c-system: #888a8f;
}
html, body {
  width:100%; height:100%;
  background:transparent;
  font-family:var(--font-ui);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}

/* ── FEED messages flottants ── */
#feed {
  position:fixed;
  top:14px; left:14px;
  width:460px;
  display:flex;
  flex-direction:column;
  gap:2px;
  pointer-events:none;
}

.msg {
  display:flex;
  align-items:baseline;
  gap:0;
  opacity:1;
  transition:opacity 1.2s ease;
  line-height:1.5;
}
.msg.fade { opacity:0; }
.msg * { text-shadow:var(--shadow); }

.mt   { font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-right:8px;flex-shrink:0; }
.mbadge { font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
          padding:1px 5px;border-radius:2px;margin-right:6px;flex-shrink:0;text-shadow:none; }
.mname  { font-size:13px;font-weight:600;color:var(--accent);margin-right:4px;flex-shrink:0; }
.msep   { font-size:13px;color:rgba(200,203,214,0.3);margin-right:5px;flex-shrink:0; }
.mtext  { font-size:13px;font-weight:400;color:var(--c-say);flex:1;min-width:0;word-break:break-word; }

.t-me .mbadge { background:rgba(126,184,212,.18);color:var(--c-me); }
.t-me .mname  { color:var(--c-me); }
.t-me .mtext  { color:var(--c-me);font-style:italic; }

.t-it .mname,.t-it .msep { display:none; }
.t-it .mbadge { background:rgba(176,159,212,.18);color:var(--c-it); }
.t-it .mtext  { color:var(--c-it);font-style:italic; }

.t-do .mbadge { background:rgba(126,196,160,.18);color:var(--c-do); }
.t-do .mname  { color:var(--c-do); }
.t-do .mtext  { color:var(--c-do); }

.t-ooc .mbadge { background:rgba(196,184,126,.18);color:var(--c-ooc); }
.t-ooc .mname  { color:var(--c-ooc); }
.t-ooc .mtext  { color:var(--c-ooc); }

.t-w .mbadge { background:rgba(196,126,126,.18);color:var(--c-w); }
.t-w .mname  { color:var(--c-w); }
.t-w .mtext  { color:var(--c-w);font-style:italic; }

.t-advert .mbadge { background:rgba(196,160,126,.18);color:var(--c-advert); }
.t-advert .mname  { color:var(--c-advert); }
.t-advert .mtext  { color:var(--c-advert);font-weight:500; }

.t-system .mbadge,.t-system .mname,.t-system .msep { display:none; }
.t-system .mtext { color:var(--c-system);font-style:italic;font-size:11px; }

/* ── INPUT BAR (cachée par défaut, visible en mode chat) ── */
#input-area {
  position:fixed;
  bottom:14px; left:14px;
  display:flex;
  align-items:center;
  gap:8px;
  width:460px;
  opacity:0;
  pointer-events:none;
  transition:opacity .15s;
}
#input-area.visible {
  opacity:1;
  pointer-events:auto;
}

#type-pill {
  display:flex;align-items:center;gap:5px;padding:0 12px;height:34px;
  background:rgba(8,10,14,0.82);border:1px solid rgba(200,203,214,0.13);
  border-radius:17px;font-family:var(--font-mono);font-size:11px;font-weight:500;
  color:var(--accent);cursor:pointer;white-space:nowrap;flex-shrink:0;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:background .15s;letter-spacing:.02em;border:none;
}
#type-pill:hover { background:rgba(16,20,28,0.9); }
.pd { width:6px;height:6px;border-radius:50%;flex-shrink:0; }

#inp-wrap {
  flex:1;height:34px;background:rgba(8,10,14,0.82);
  border:1px solid rgba(200,203,214,0.13);border-radius:17px;
  display:flex;align-items:center;padding:0 14px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:border-color .15s;
}
#inp-wrap:focus-within { border-color:rgba(200,203,214,0.26); }

#inp {
  flex:1;background:transparent;border:none;outline:none;
  font-family:var(--font-ui);font-size:13px;font-weight:400;
  color:var(--accent);min-width:0;
}
#inp::placeholder { color:var(--muted); }

#send {
  width:34px;height:34px;border-radius:50%;background:rgba(8,10,14,0.82);
  border:1px solid rgba(200,203,214,0.13);display:flex;align-items:center;
  justify-content:center;cursor:pointer;flex-shrink:0;color:var(--muted);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:color .15s;
}
#send:hover { color:var(--accent); }
#send svg { width:13px;height:13px;fill:currentColor; }

/* ── DROPDOWN type ── */
#dd {
  position:fixed;bottom:56px;left:14px;width:218px;
  background:rgba(8,10,14,0.96);border:1px solid rgba(200,203,214,0.17);
  border-radius:8px;overflow:hidden;display:none;flex-direction:column;
  z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:0 8px 32px rgba(0,0,0,.65);
}
#dd.open { display:flex; }
.ddt { padding:7px 12px;font-size:9px;font-weight:600;letter-spacing:.14em;
       text-transform:uppercase;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.05); }
.ddo { display:flex;align-items:center;gap:9px;padding:7px 12px;cursor:pointer;
       transition:background .1s;border-bottom:1px solid rgba(255,255,255,.04); }
.ddo:last-child { border-bottom:none; }
.ddo:hover { background:rgba(255,255,255,.05); }
.ddo.sel  { background:rgba(200,203,214,.07); }
.ddot { width:6px;height:6px;border-radius:50%;flex-shrink:0; }
.ddoc { font-family:var(--font-mono);font-size:11px;font-weight:500;color:var(--accent);min-width:54px; }
.ddod { font-size:11px;color:var(--muted); }
</style>
</head>
<body>

<div id="feed"></div>

<div id="dd">
  <div class="ddt">Type de message</div>
</div>

<div id="input-area">
  <button id="type-pill" onclick="togDD()">
    <span class="pd" id="pdot"></span>
    <span id="plabel">/say</span>
  </button>
  <div id="inp-wrap">
    <input id="inp" placeholder="Envoyez un message ..."
      maxlength="250" onkeydown="onKey(event)" oninput="onInput(event)" />
  </div>
  <button id="send" onclick="doSend()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
// ── Types disponibles
var TYPES = [
  {id:'say',    cmd:'/say',    label:'/say',    desc:'Dialogue normal',   color:'#c8cbd6'},
  {id:'me',     cmd:'/me',     label:'/me',     desc:'Action (3e pers.)', color:'#7eb8d4'},
  {id:'it',     cmd:'/it',     label:'/it',     desc:'Narration',         color:'#b09fd4'},
  {id:'do',     cmd:'/do',     label:'/do',     desc:'Description',       color:'#7ec4a0'},
  {id:'ooc',    cmd:'/ooc',    label:'/ooc',    desc:'Hors personnage',   color:'#c4b87e'},
  {id:'w',      cmd:'/w',      label:'/w',      desc:'Chuchotement',      color:'#c47e7e'},
  {id:'advert', cmd:'/advert', label:'/advert', desc:'Publicité',         color:'#c4a07e'},
];
var BADGES = {say:'SAY',me:'ME',it:'IT','do':'DO',ooc:'OOC',w:'MURMURE',advert:'ANNONCE'};
var MSG_LIFETIME = 14000;
var MSG_MAX = 20;

var currentType = TYPES[0];
var ddOpen = false;
var chatOpen = false;

// ── Build dropdown
var ddEl = document.getElementById('dd');
TYPES.forEach(function(t) {
  var el = document.createElement('div');
  el.className = 'ddo' + (t.id === 'say' ? ' sel' : '');
  el.dataset.id = t.id;
  el.innerHTML = '<span class="ddot" style="background:' + t.color + '"></span>'
               + '<span class="ddoc">' + t.label + '</span>'
               + '<span class="ddod">' + t.desc + '</span>';
  el.onclick = function() { selType(t); };
  ddEl.appendChild(el);
});

function selType(t) {
  currentType = t;
  document.getElementById('pdot').style.background = t.color;
  document.getElementById('plabel').textContent = t.label;
  document.querySelectorAll('.ddo').forEach(function(e) {
    e.classList.toggle('sel', e.dataset.id === t.id);
  });
  closDD();
  document.getElementById('inp').focus();
}

function togDD() { ddOpen ? closDD() : openDD(); }
function openDD() { ddOpen = true; ddEl.classList.add('open'); }
function closDD() { ddOpen = false; ddEl.classList.remove('open'); }

document.addEventListener('click', function(e) {
  if (ddOpen && !e.target.closest('#type-pill') && !e.target.closest('#dd')) closDD();
});

// ── Chat open/close (appelé par Lua via RunJavaScript)
function openChat() {
  chatOpen = true;
  document.getElementById('input-area').classList.add('visible');
  document.getElementById('inp').focus();
}

function closeChat() {
  chatOpen = false;
  closDD();
  document.getElementById('input-area').classList.remove('visible');
  document.getElementById('inp').value = '';
}

// ── Feed
var feed = document.getElementById('feed');

function gTime() {
  var n = new Date();
  return String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}

// Appelé par Lua : add({type, name, time, text})
function add(m) {
  var d = document.createElement('div');
  d.className = 'msg t-' + (m.type || 'say');

  var tm = document.createElement('span');
  tm.className = 'mt';
  tm.textContent = m.time || gTime();
  d.appendChild(tm);

  var tp = m.type || 'say';
  if (tp !== 'say' && tp !== 'system') {
    var badge = document.createElement('span');
    badge.className = 'mbadge';
    badge.textContent = BADGES[tp] || tp.toUpperCase();
    d.appendChild(badge);
  }

  if (m.name && tp !== 'it' && tp !== 'system') {
    var nm = document.createElement('span');
    nm.className = 'mname';
    nm.textContent = m.name;
    d.appendChild(nm);
    var sep = document.createElement('span');
    sep.className = 'msep';
    sep.textContent = tp === 'say' ? ':' : '';
    d.appendChild(sep);
  }

  var tx = document.createElement('span');
  tx.className = 'mtext';
  tx.textContent = m.text;
  d.appendChild(tx);

  feed.appendChild(d);

  // Limite le nombre de messages affichés
  while (feed.children.length > MSG_MAX) {
    feed.removeChild(feed.children[0]);
  }

  // Auto-fade
  setTimeout(function() {
    d.classList.add('fade');
    setTimeout(function() { if (d.parentNode) feed.removeChild(d); }, 1200);
  }, MSG_LIFETIME);
}

// ── Envoi
function doSend() {
  var inp = document.getElementById('inp');
  var txt = inp.value.trim();
  if (!txt) { closeChat(); return; }

  // Bridge GMod (window.GChat injecté par le DHTML Lua)
  if (window.GChat && typeof window.GChat.Send === 'function') {
    window.GChat.Send(currentType.id, txt);
  } else {
    // Fallback hors GMod (prévisualisation)
    add({ type: currentType.id, name: 'Vous', time: gTime(), text: txt });
  }

  inp.value = '';
  closeChat();
}

function onKey(e) {
  if (e.key === 'Enter') { doSend(); }
  if (e.key === 'Escape') {
    closDD();
    closeChat();
    // Notifie Lua qu'on ferme
    if (window.GChat && typeof window.GChat.Close === 'function') {
      window.GChat.Close();
    }
  }
}

function onInput(e) {
  var v = e.target.value;
  if (v.startsWith('/')) {
    var cmd = v.split(' ')[0].toLowerCase();
    var found = TYPES.find(function(t) { return t.cmd.toLowerCase() === cmd; });
    if (found) {
      e.target.value = v.slice(cmd.length).trimStart();
      selType(found);
    }
  }
}

// Init
selType(TYPES[0]);
</script>
</body>
</html>
