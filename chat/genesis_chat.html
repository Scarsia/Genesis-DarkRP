<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genesis Chat</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* nuke GMod's gross default scrollbar */
::-webkit-scrollbar{width:0;height:0;}
html{scrollbar-width:none;}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:transparent;
  color:#e8eaf0;
  font-family:'Segoe UI',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  pointer-events:none; /* seul le shell ouvert reçoit les events */
}

/* ======================================================
   CHAT FRAME — top-left, taille fixe 660x420, transparent
   ====================================================== */
#gx-root{
  position:absolute;
  top:18px;left:18px;
  width:660px;
  height:420px;
}
.gx-shell{
  position:relative;
  width:100%;height:100%;
  border-radius:14px;
  padding:12px 14px;
  background:transparent;
  border:0.5px solid transparent;
  transition:background 140ms ease,border-color 140ms ease;
}

/* état OUVERT : glass panel */
body.gx-open .gx-shell{
  background:rgba(8,10,14,0.82);
  border-color:rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  pointer-events:auto;
}
body.gx-open .gx-shell::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.14) 50%,transparent);
  border-radius:14px 14px 0 0;
  pointer-events:none;
}

/* ======================================================
   TABS
   ====================================================== */
.gx-tabs{
  display:flex;gap:6px;height:30px;margin-bottom:10px;
  transition:opacity 140ms;
}
body:not(.gx-open) .gx-tabs{opacity:0;pointer-events:none;}
.gx-tab{
  flex:0 0 96px;height:30px;border-radius:8px;
  background:rgba(255,255,255,0.04);
  border:0.5px solid rgba(255,255,255,0.08);
  color:#7a8898;font-size:12px;font-weight:600;letter-spacing:0.02em;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 140ms;position:relative;font-family:inherit;outline:none;
}
.gx-tab:hover{background:rgba(255,255,255,0.07);color:#9aa4b4;}
.gx-tab.gx-on{
  background:rgba(184,188,200,0.12);
  border-color:rgba(184,188,200,0.28);
  color:#e0e4ef;
}
.gx-tab.gx-on::before{
  content:'';position:absolute;top:0;left:18%;right:18%;height:1px;
  background:rgba(184,188,200,0.7);
}

/* ======================================================
   HISTORY
   ====================================================== */
.gx-history{
  height:calc(100% - 90px);
  overflow-y:auto;overflow-x:hidden;
  padding-right:6px;margin-bottom:8px;
}
body:not(.gx-open) .gx-history{
  height:100%;margin-bottom:0;
  mask-image:linear-gradient(to bottom,rgba(0,0,0,0.15) 0%,rgba(0,0,0,1) 15%,rgba(0,0,0,1) 100%);
  -webkit-mask-image:linear-gradient(to bottom,rgba(0,0,0,0.15) 0%,rgba(0,0,0,1) 15%,rgba(0,0,0,1) 100%);
}

.gx-line{
  margin:0 0 7px 0;
  font-size:13.5px;line-height:1.42;color:#c8ccd8;
  word-break:break-word;
  transition:opacity 480ms ease, max-height 480ms ease, margin 480ms ease, padding 480ms ease;
  max-height:120px;overflow:hidden;
}
body:not(.gx-open) .gx-line{
  text-shadow:0 1px 2px rgba(0,0,0,0.92),0 0 6px rgba(0,0,0,0.6);
}
/* fade-out automatique des vieux messages quand le chat est fermé */
body:not(.gx-open) .gx-line.gx-faded{
  opacity:0;max-height:0;margin:0;padding:0;
  overflow:hidden;pointer-events:none;
}

.gx-prefix{
  margin-right:8px;font-size:10.5px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.14em;
}
.gx-name{font-weight:600;color:#e8eaf0;}
.gx-colon{color:#4a5870;margin:0 2px;}
.gx-msg{color:#c8ccd8;}
.gx-time{
  margin-left:8px;font-size:10px;letter-spacing:0.06em;
  color:#4a5870;font-variant-numeric:tabular-nums;
}

/* action /me + scene /it */
.gx-line.gx-action,.gx-line.gx-scene-line{margin:4px 0 10px 0;}
.gx-action-text,.gx-scene-text{
  font-size:14.5px;font-style:italic;color:#e8eaf0;letter-spacing:0.01em;
}
.gx-scene-text{opacity:0.92;}
.gx-meta{
  display:flex;align-items:center;gap:8px;margin-top:3px;
  font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.18em;
  color:#6a7890;
}
.gx-meta .gx-dot{display:inline-block;width:4px;height:4px;border-radius:50%;background:currentColor;opacity:0.7;}
.gx-meta .gx-who{color:#c8ccd8;text-transform:none;letter-spacing:0;font-weight:500;font-size:10px;}
.gx-meta .gx-mt{margin-left:auto;color:#4a5870;letter-spacing:0.06em;font-variant-numeric:tabular-nums;font-size:9.5px;font-weight:500;}

/* blocs colorés pour advert / admin / pm / system */
.gx-tone-advert.gx-normal{
  padding:6px 10px;border-left:1.5px solid rgba(212,168,48,0.6);
  background:linear-gradient(90deg,rgba(212,168,48,0.06),rgba(212,168,48,0.015) 60%,transparent);
  border-radius:0 6px 6px 0;margin-bottom:8px;
}
.gx-tone-admin.gx-normal{
  padding:5px 10px;border-left:1.5px solid rgba(192,80,112,0.55);
  background:linear-gradient(90deg,rgba(192,80,112,0.05),transparent 75%);
  border-radius:0 6px 6px 0;
}
.gx-tone-pm.gx-normal{
  padding:5px 10px;border-left:1.5px solid rgba(168,120,192,0.5);
  background:linear-gradient(90deg,rgba(168,120,192,0.04),transparent 75%);
  border-radius:0 6px 6px 0;
}
.gx-tone-system.gx-normal{
  padding:5px 10px;border-left:1.5px solid rgba(208,80,80,0.5);
  background:linear-gradient(90deg,rgba(208,80,80,0.05),transparent 75%);
  border-radius:0 6px 6px 0;
}

/* tones — prefix colors */
.gx-tone-local   .gx-prefix{color:rgba(184,188,200,0.85);}
.gx-tone-team    .gx-prefix{color:#8aaccf;}
.gx-tone-radio   .gx-prefix{color:#8aaccf;}
.gx-tone-system  .gx-prefix{color:#e06060;}
.gx-tone-info    .gx-prefix{color:rgba(212,168,48,0.9);}
.gx-tone-dead    .gx-prefix{color:#a85e5e;}
.gx-tone-ooc     .gx-prefix{color:#7090b8;}
.gx-tone-advert  .gx-prefix{color:#e8c050;}
.gx-tone-admin   .gx-prefix{color:#d86888;}
.gx-tone-pm      .gx-prefix{color:#c090d8;}

/* tones — message tint */
.gx-tone-team    .gx-msg,.gx-tone-radio .gx-msg{color:rgba(170,198,226,0.92);}
.gx-tone-system  .gx-msg{color:rgba(232,158,158,0.95);}
.gx-tone-info    .gx-msg{color:rgba(216,192,136,0.88);}
.gx-tone-ooc     .gx-msg{color:rgba(160,180,208,0.88);}
.gx-tone-advert  .gx-msg{color:rgba(232,216,168,0.95);font-weight:500;}
.gx-tone-admin   .gx-msg{color:rgba(224,184,200,0.92);}
.gx-tone-pm      .gx-msg{color:rgba(216,192,232,0.92);}
.gx-tone-dead    .gx-msg{color:rgba(200,156,156,0.88);}

/* ======================================================
   BOTTOM BAR (chip + input + send)
   ====================================================== */
.gx-bar{
  display:flex;gap:6px;height:42px;margin-bottom:8px;
  transition:opacity 140ms;
}
body:not(.gx-open) .gx-bar{opacity:0;pointer-events:none;}

.gx-chip{
  width:96px;height:42px;border-radius:10px;
  background:rgba(255,255,255,0.08);
  border:0.5px solid rgba(184,188,200,0.28);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  font-size:12px;font-weight:600;letter-spacing:0.04em;color:#b8bcc8;
  text-transform:uppercase;
  transition:color 140ms,border-color 140ms;
  user-select:none;
}
.gx-chip::before{
  content:'';position:absolute;top:0;bottom:0;left:0;width:2px;
  border-radius:10px 0 0 10px;background:currentColor;opacity:0.85;
}

.gx-input{
  flex:1;min-width:0;height:42px;border-radius:10px;
  background:rgba(255,255,255,0.05);
  border:0.5px solid rgba(255,255,255,0.1);
  color:#e8eaf0;font-family:inherit;font-size:15px;
  padding:0 14px;outline:none;transition:all 140ms;
}
.gx-input:focus{
  background:rgba(255,255,255,0.08);
  border-color:rgba(184,188,200,0.45);
}
.gx-input::placeholder{color:rgba(90,104,128,0.9);}

.gx-send{
  width:42px;height:42px;border-radius:10px;
  background:rgba(184,188,200,0.1);
  border:0.5px solid rgba(184,188,200,0.3);
  color:#e8eaf0;font-size:22px;line-height:1;
  cursor:pointer;transition:all 140ms;font-family:inherit;
}
.gx-send:hover{background:rgba(184,188,200,0.2);border-color:rgba(184,188,200,0.55);}

/* ======================================================
   HINTS (bas)
   ====================================================== */
.gx-hints{
  display:flex;gap:6px;height:20px;
  transition:opacity 140ms;
}
body:not(.gx-open) .gx-hints{opacity:0;pointer-events:none;}
.gx-hint{
  padding:0 10px;height:20px;border-radius:6px;
  background:rgba(255,255,255,0.03);
  border:0.5px solid rgba(255,255,255,0.06);
  font-size:10px;color:rgba(106,120,144,0.9);
  letter-spacing:0.12em;text-transform:uppercase;font-weight:500;
  display:flex;align-items:center;
}
</style>
</head>
<body>

<div id="gx-root">
  <div class="gx-shell" id="gxShell">
    <div class="gx-tabs" id="gxTabs">
      <button class="gx-tab gx-on" data-tab="global">Global</button>
      <button class="gx-tab" data-tab="team">Équipe</button>
      <button class="gx-tab" data-tab="pm">Privé</button>
    </div>

    <div class="gx-history" id="gxHist"></div>

    <div class="gx-bar">
      <div class="gx-chip" id="gxChip">Message</div>
      <input class="gx-input" id="gxInput" placeholder="Envoyez un message ..." autocomplete="off" spellcheck="false" />
      <button class="gx-send" id="gxSend" title="Envoyer" tabindex="-1">›</button>
    </div>

    <div class="gx-hints">
      <div class="gx-hint">Enter · Envoyer</div>
      <div class="gx-hint">Tab · Onglet</div>
      <div class="gx-hint">Échap · Fermer</div>
    </div>
  </div>
</div>

<script>
(function(){
  var shell  = document.getElementById('gxShell');
  var tabsEl = document.getElementById('gxTabs');
  var histEl = document.getElementById('gxHist');
  var chipEl = document.getElementById('gxChip');
  var inputEl= document.getElementById('gxInput');
  var sendEl = document.getElementById('gxSend');

  var MAX_LINES = 160;
  var FADE_AFTER_MS = 10000; // en mode fermé, les messages > 10s fade out

  var state = {
    open:false,
    tab:'global',
    lines:[] // [{id, prefix, name, message, tone, kind, time, ts}]
  };

  var idCounter = 0;

  // ========= Bridge Lua <-> JS =========
  function toLua(method, payload){
    try{
      if (window.genesis_chat && typeof window.genesis_chat[method] === 'function'){
        window.genesis_chat[method](typeof payload === 'string' ? payload : JSON.stringify(payload || {}));
      }
    }catch(e){}
  }

  // ========= Helpers =========
  function esc(s){
    return String(s==null?'':s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  // ========= Chip =========
  function chipFor(tab, text){
    var v = String(text||'').trim();
    var low = v.toLowerCase();
    if (tab==='team'){
      if (low.indexOf('/radio')===0) return { t:'/radio', c:'#8aaccf' };
      return { t:'/team', c:'#8aaccf' };
    }
    if (tab==='pm'){
      if (low.indexOf('/reply')===0) return { t:'/reply', c:'#c090d8' };
      return { t:'/pm', c:'#c090d8' };
    }
    if (low==='/me'     || low.indexOf('/me ')    ===0) return { t:'/me',     c:'#c8ccd8' };
    if (low==='/it'     || low.indexOf('/it ')    ===0) return { t:'/it',     c:'#d8c088' };
    if (low==='/advert' || low.indexOf('/advert ')===0) return { t:'/advert', c:'#d4a830' };
    if (v.indexOf('@')===0)   return { t:'@',   c:'#d86888' };
    if (v.indexOf('///')===0) return { t:'///', c:'#d86888' };
    if (low.indexOf('//')===0) return { t:'//', c:'#7090b8' };
    if (low==='/ooc' || low.indexOf('/ooc ')===0) return { t:'/ooc', c:'#7090b8' };
    return { t:'Message', c:'#b8bcc8' };
  }

  function placeholderFor(tab){
    if (tab==='team') return 'Envoyez un message équipe ...';
    if (tab==='pm')   return 'Utilisez /pm ou /reply ...';
    return 'Envoyez un message ...';
  }

  function updateChip(){
    var c = chipFor(state.tab, inputEl.value);
    chipEl.textContent = c.t;
    chipEl.style.color = c.c;
    chipEl.style.borderColor = hexToRgba(c.c, 0.35);
  }

  function hexToRgba(hex, a){
    var h = hex.replace('#','');
    var r = parseInt(h.substring(0,2),16);
    var g = parseInt(h.substring(2,4),16);
    var b = parseInt(h.substring(4,6),16);
    return 'rgba('+r+','+g+','+b+','+a+')';
  }

  // ========= Render =========
  function renderLine(l){
    var cls = 'gx-line gx-tone-' + esc(l.tone||'local');
    if (l.kind === 'action'){
      return '<div class="'+cls+' gx-action" data-id="'+l.id+'" data-ts="'+l.ts+'">'
        + '<div class="gx-action-text">'+esc(l.message)+'</div>'
        + '<div class="gx-meta"><span class="gx-dot"></span><span>/'+esc((l.prefix||'me').toLowerCase())+'</span>'
        +   (l.name?'<span class="gx-who">'+esc(l.name)+'</span>':'')
        +   '<span class="gx-mt">'+esc(l.time||'')+'</span></div>'
        + '</div>';
    }
    if (l.kind === 'scene'){
      return '<div class="'+cls+' gx-scene-line" data-id="'+l.id+'" data-ts="'+l.ts+'">'
        + '<div class="gx-scene-text">'+esc(l.message)+'</div>'
        + '<div class="gx-meta"><span class="gx-dot"></span><span>/'+esc((l.prefix||'it').toLowerCase())+'</span>'
        +   (l.name?'<span class="gx-who">'+esc(l.name)+'</span>':'')
        +   '<span class="gx-mt">'+esc(l.time||'')+'</span></div>'
        + '</div>';
    }
    return '<div class="'+cls+' gx-normal" data-id="'+l.id+'" data-ts="'+l.ts+'">'
      + (l.prefix?'<span class="gx-prefix">'+esc(l.prefix)+'</span>':'')
      + (l.name?'<span class="gx-name">'+esc(l.name)+'</span>':'')
      + (l.name?'<span class="gx-colon">:</span>':'')
      + '<span class="gx-msg">'+esc(l.message)+'</span>'
      + '<span class="gx-time">'+esc(l.time||'')+'</span>'
      + '</div>';
  }

  function fullRender(){
    var out = '';
    for (var i=0;i<state.lines.length;i++) out += renderLine(state.lines[i]);
    histEl.innerHTML = out;
    applyFade();
    scrollBottom();
  }

  function appendLine(line){
    histEl.insertAdjacentHTML('beforeend', renderLine(line));
    applyFade();
    scrollBottom();
  }

  function scrollBottom(){
    histEl.scrollTop = histEl.scrollHeight;
  }

  // ========= Fade-out en mode fermé =========
  function applyFade(){
    var now = Date.now();
    var nodes = histEl.querySelectorAll('.gx-line');
    for (var i=0;i<nodes.length;i++){
      var ts = parseInt(nodes[i].getAttribute('data-ts')||'0',10);
      if (!state.open && (now - ts) > FADE_AFTER_MS){
        nodes[i].classList.add('gx-faded');
      } else {
        nodes[i].classList.remove('gx-faded');
      }
    }
  }
  setInterval(applyFade, 500);

  // ========= Tabs =========
  function setTab(t, silent){
    if (t!=='global' && t!=='team' && t!=='pm') t='global';
    state.tab = t;
    var btns = tabsEl.querySelectorAll('.gx-tab');
    for (var i=0;i<btns.length;i++){
      if (btns[i].getAttribute('data-tab')===t) btns[i].classList.add('gx-on');
      else btns[i].classList.remove('gx-on');
    }
    inputEl.placeholder = placeholderFor(t);
    updateChip();
    if (!silent && state.open) inputEl.focus();
  }

  // ========= Open / Close =========
  function doOpen(tab){
    state.open = true;
    document.body.classList.add('gx-open');
    setTab(tab || state.tab || 'global', true);
    inputEl.value = '';
    updateChip();
    applyFade();
    setTimeout(function(){ try{ inputEl.focus(); }catch(e){} }, 10);
    scrollBottom();
  }

  function doClose(){
    state.open = false;
    document.body.classList.remove('gx-open');
    inputEl.value = '';
    try{ inputEl.blur(); }catch(e){}
    updateChip();
    applyFade();
    toLua('close');
  }

  // ========= Submit =========
  function submit(){
    var v = inputEl.value; // garde les espaces internes mais trim aux bords
    v = v.replace(/^\s+|\s+$/g,'');
    if (v === ''){
      doClose();
      return;
    }
    toLua('send', { tab: state.tab, text: v });
    inputEl.value = '';
    // Le Lua fera un doClose via genesisChatClose() ; on reste prudent :
    doClose();
  }

  // ========= Wire UI =========
  var tabs = tabsEl.querySelectorAll('.gx-tab');
  for (var i=0;i<tabs.length;i++){
    (function(b){
      b.addEventListener('click', function(){ setTab(b.getAttribute('data-tab')); });
    })(tabs[i]);
  }

  inputEl.addEventListener('input', updateChip);
  inputEl.addEventListener('keydown', function(e){
    if (e.key === 'Enter'){
      e.preventDefault();
      submit();
    } else if (e.key === 'Tab'){
      e.preventDefault();
      var order = ['global','team','pm'];
      var idx = order.indexOf(state.tab);
      setTab(order[(idx+1)%order.length]);
    } else if (e.key === 'Escape'){
      e.preventDefault();
      doClose();
    }
  });
  sendEl.addEventListener('click', submit);

  // ========= API exposée à Lua =========

  // Ajouter un message (appelé par Lua à chaque ligne reçue)
  window.genesisChatAdd = function(json){
    try{
      var data = (typeof json === 'string') ? JSON.parse(json) : json;
      if (!data) return;
      var line = {
        id: ++idCounter,
        prefix:  String(data.prefix  || ''),
        name:    String(data.name    || ''),
        message: String(data.message || ''),
        tone:    String(data.tone    || 'local'),
        kind:    String(data.kind    || 'normal'),
        time:    String(data.time    || ''),
        ts:      Date.now()
      };
      state.lines.push(line);
      while (state.lines.length > MAX_LINES) state.lines.shift();
      // On ré-render partiellement : append + purge DOM si dépassement
      appendLine(line);
      var domLines = histEl.querySelectorAll('.gx-line');
      while (domLines.length > MAX_LINES){
        histEl.removeChild(domLines[0]);
        domLines = histEl.querySelectorAll('.gx-line');
      }
    }catch(e){}
  };

  // Remplacer tout l'état (utile au démarrage ou pour un clear)
  window.genesisChatSetState = function(json){
    try{
      var data = (typeof json === 'string') ? JSON.parse(json) : json;
      if (!data) return;
      if (Array.isArray(data.lines)){
        state.lines = [];
        for (var i=0;i<data.lines.length;i++){
          var l = data.lines[i];
          state.lines.push({
            id: ++idCounter,
            prefix:  String(l.prefix  || ''),
            name:    String(l.name    || ''),
            message: String(l.message || ''),
            tone:    String(l.tone    || 'local'),
            kind:    String(l.kind    || 'normal'),
            time:    String(l.time    || ''),
            ts:      Date.now()
          });
        }
        fullRender();
      }
      if (typeof data.open === 'boolean'){
        if (data.open) doOpen(data.tab);
        else doClose();
      }
    }catch(e){}
  };

  window.genesisChatClear = function(){
    state.lines = [];
    fullRender();
  };

  window.genesisChatOpen = function(tab){
    doOpen(tab || 'global');
  };

  window.genesisChatClose = function(){
    doClose();
  };

  // Initial : signale à Lua qu'on est prêt
  updateChip();
  applyFade();
  setTimeout(function(){ toLua('ready'); }, 30);

})();
</script>
</body>
</html>
