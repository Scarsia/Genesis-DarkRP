<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Config Supérette</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { display:flex; align-items:center; justify-content:center; height:100vh; }

#app {
  width: 760px; height: 600px;
  display: flex; flex-direction: column;
}

/* two-col inner layout */
#body  { display:flex; gap:12px; flex:1; overflow:hidden; padding:14px; }
#left  { width:220px; flex-shrink:0; display:flex; flex-direction:column; gap:10px; overflow-y:auto; }
#right { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* ── Left : stats + config ── */
.stat3  { display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; }

.cfg-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:6px 0; border-bottom:1px solid rgba(255,255,255,.04);
}
.cfg-row:last-child { border-bottom:none; }
.cfg-k  { font-size:10px; color:#5a6060; font-weight:500; }
.cfg-v-wrap { display:flex; align-items:center; justify-content:flex-end; }
.cfg-val {
  font-size:10px; font-weight:600; color:var(--accent);
  background:rgba(255,255,255,.04); padding:2px 8px;
  border-radius:4px; border:1px solid var(--border);
}

/* ── Right : product list ── */
#prod-list { flex:1; overflow-y:auto; padding-right:4px; }

.padmin {
  display:flex; align-items:center; gap:8px; padding:7px 9px; margin-bottom:6px;
  cursor:pointer;
}
.padmin.selected { border-color:var(--border-h); background:var(--card-bg-sel); }
.pai {
  font-size:16px; width:30px; height:30px;
  display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,.03); border-radius:5px; flex-shrink:0;
  border:1px solid var(--border);
}
.pain { flex:1; }
.pain-n { font-size:10.5px; font-weight:600; color:var(--accent); }
.pain-m { font-size:8.5px; color:var(--muted2); margin-top:1px; }
.pain-m span { color:#4a6a7a; }
.par  { text-align:right; flex-shrink:0; }
.pap  { font-size:10px; font-weight:700; color:var(--price); }
.del-btn {
  width:18px; height:18px; border-radius:3px;
  background:rgba(200,80,80,.1); border:1px solid rgba(200,80,80,.18);
  color:var(--red); font-size:11px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; margin-left:6px; flex-shrink:0; line-height:1;
}
.del-btn:hover { background:rgba(200,80,80,.25); }
.add-row {
  display:flex; align-items:center; justify-content:center; gap:6px;
  padding:8px; border:1px dashed rgba(200,203,214,.1);
  border-radius:6px; cursor:pointer; margin-top:4px; transition:.15s;
}
.add-row:hover { border-color:rgba(200,203,214,.22); background:rgba(255,255,255,.02); }
.add-row span { font-size:10px; color:#3a4040; font-weight:600; letter-spacing:.06em; text-transform:uppercase; }

/* ── Edit modal ── */
#edit-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.75);
  align-items:center; justify-content:center; z-index:50;
}
#edit-overlay.show { display:flex; }
#edit-modal { width:340px; padding:22px; }
.form-row { margin-bottom:10px; }
.form-lbl { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.form-row .inp { width:100%; }
.form-row-half { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
</style>
</head>
<body>

<div id="app" class="panel">

  <div class="ph">
    <div class="ph-left">
      <div class="ph-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="2.2" stroke="#c8cbd6" stroke-width="1.1" opacity=".6"/>
          <path d="M7 1.5v1.5M7 11v1.5M1.5 7H3M11 7h1.5M3.22 3.22l1.06 1.06M9.72 9.72l1.06 1.06M3.22 10.78l1.06-1.06M9.72 4.28l1.06-1.06" stroke="#c8cbd6" stroke-width="1" stroke-linecap="round" opacity=".5"/>
        </svg>
      </div>
      <div>
        <div class="ph-title">Config Supérette</div>
        <div class="ph-sub">Panneau SuperAdmin</div>
      </div>
    </div>
    <button class="btn-close" onclick="GS.Close()">✕</button>
  </div>

  <div id="body">

    <!-- ── LEFT ── -->
    <div id="left">
      <div class="sa-badge">SuperAdmin</div>

      <!-- Stats -->
      <div class="stat3">
        <div class="stat"><div class="stat-n">Ventes</div><div class="stat-v g" id="s-sales">—</div></div>
        <div class="stat"><div class="stat-n">Revenus</div><div class="stat-v a" id="s-rev">—</div></div>
        <div class="stat"><div class="stat-n">Produits</div><div class="stat-v" id="s-prods">—</div></div>
      </div>

      <!-- Config generale -->
      <div>
        <div class="sbar">Général</div>

        <div class="cfg-row">
          <div class="cfg-k">Nom boutique</div>
          <input class="inp" id="cfg-name" style="width:110px;font-size:10px;padding:3px 7px" placeholder="Supérette">
        </div>
        <div class="cfg-row">
          <div class="cfg-k">Job gérant</div>
          <input class="inp" id="cfg-job" style="width:110px;font-size:10px;padding:3px 7px" placeholder="shopkeeper">
        </div>
        <div class="cfg-row">
          <div class="cfg-k">Boutique ouverte</div>
          <div class="toggle" id="tog-open" onclick="toggleCfg('open')"></div>
        </div>
        <div class="cfg-row">
          <div class="cfg-k">Stock limité</div>
          <div class="toggle" id="tog-stock" onclick="toggleCfg('stock')"></div>
        </div>
        <div class="cfg-row">
          <div class="cfg-k">Restock auto</div>
          <div class="toggle" id="tog-restock" onclick="toggleCfg('restock')"></div>
        </div>
      </div>

      <!-- Actions -->
      <div style="margin-top:auto;display:flex;flex-direction:column;gap:6px">
        <button class="btn btn-primary" onclick="saveAll()">Sauvegarder</button>
        <button class="btn btn-ghost"   onclick="loadData()">Rafraîchir</button>
      </div>
    </div>

    <!-- ── RIGHT : produits ── -->
    <div id="right">
      <div class="sbar" style="margin-top:0">Gestion des produits</div>

      <div id="prod-list">
        <div id="prod-rows"></div>
        <div class="add-row" onclick="openEdit(null)">
          <span style="font-size:13px;color:#3a4040">+</span>
          <span>Ajouter un produit</span>
        </div>
      </div>
    </div>

  </div><!-- #body -->

</div><!-- #app -->

<!-- ── Edit product modal ── -->
<div id="edit-overlay">
  <div id="edit-modal" class="panel">
    <div class="ph" style="margin:-22px -22px 0;border-radius:8px 8px 0 0">
      <div class="ph-left">
        <div class="ph-title" id="edit-title">Ajouter un produit</div>
      </div>
      <button class="btn-close" onclick="closeEdit()">✕</button>
    </div>
    <div style="padding-top:14px">
      <input type="hidden" id="edit-id">
      <div class="form-row-half">
        <div>
          <div class="form-lbl">Emoji</div>
          <input class="inp" id="edit-emoji" placeholder="📦" style="text-align:center">
        </div>
        <div>
          <div class="form-lbl">Catégorie</div>
          <input class="inp" id="edit-cat" placeholder="food/drinks...">
        </div>
      </div>
      <div class="form-row">
        <div class="form-lbl">Nom du produit</div>
        <input class="inp" id="edit-name" placeholder="Ex: Soda Cola">
      </div>
      <div class="form-row">
        <div class="form-lbl">Nom de l'item GXD</div>
        <input class="inp" id="edit-item" placeholder="sc_soda">
      </div>
      <div class="form-row">
        <div class="form-lbl">Description</div>
        <input class="inp" id="edit-desc" placeholder="Description courte">
      </div>
      <div class="form-row-half">
        <div>
          <div class="form-lbl">Prix ($)</div>
          <input class="inp" id="edit-price" type="number" step="0.01" min="0" placeholder="1.00">
        </div>
        <div>
          <div class="form-lbl">Stock</div>
          <input class="inp" id="edit-stock" type="number" min="0" placeholder="50">
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-ghost"   onclick="closeEdit()">Annuler</button>
        <button class="btn btn-primary" onclick="saveProduct()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<script>
// ── State ──
var _data     = {};     // { config, products, stats }
var _togState = { open:true, stock:true, restock:false };
var _editId   = null;

// ── Bridge ──
function GS_AdminInit(data) {
  _data = data;
  renderStats(data.stats || {});
  renderConfig(data.config || {});
  renderProducts(data.products || []);
}

function GS_AdminResult(res) {
  showToast(res.msg, res.ok ? 'ok' : 'err');
  if (res.ok) loadData();
}

function loadData() {
  GS.AdminReady();
}

// ── Stats ──
function renderStats(s) {
  document.getElementById('s-sales').textContent = (s.totalSales   || 0).toLocaleString('fr-FR');
  document.getElementById('s-rev').textContent   = '$' + (s.totalRevenue || 0).toFixed(2);
  document.getElementById('s-prods').textContent = s.totalProducts || 0;
}

// ── Config ──
function renderConfig(cfg) {
  document.getElementById('cfg-name').value = cfg.name || 'Supérette';
  document.getElementById('cfg-job').value  = cfg.job  || 'shopkeeper';
  _togState.open    = cfg.open    !== false;
  _togState.stock   = cfg.stockLimited !== false;
  _togState.restock = !!cfg.autoRestock;
  applyToggles();
}

function toggleCfg(key) {
  _togState[key] = !_togState[key];
  applyToggles();
}

function applyToggles() {
  setTog('tog-open',    _togState.open);
  setTog('tog-stock',   _togState.stock);
  setTog('tog-restock', _togState.restock);
}

function setTog(id, val) {
  var el = document.getElementById(id);
  if (val) el.classList.add('on'); else el.classList.remove('on');
}

// ── Products ──
function renderProducts(prods) {
  var el = document.getElementById('prod-rows');
  el.innerHTML = '';

  prods.forEach(function(p) {
    if (!p.active) return; // masque les supprimés

    var row = document.createElement('div');
    row.className = 'padmin gc';
    row.innerHTML =
      '<div class="pai">' + p.emoji + '</div>' +
      '<div class="pain">' +
        '<div class="pain-n">' + p.name + '</div>' +
        '<div class="pain-m">' + p.category + ' · <span>' + p.item_name + '</span></div>' +
      '</div>' +
      '<div class="par">' +
        '<div class="pap">$' + p.price.toFixed(2) + '</div>' +
        '<div style="margin-top:2px">' +
          '<span class="tag ' + (p.stock > 5 ? 'tag-g' : (p.stock > 0 ? 'tag-a' : 'tag-r')) + '">Stock: ' + p.stock + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="del-btn" data-del="' + p.id + '">✕</div>';

    // click row → edit
    row.querySelector('.pain').onclick = function() { openEdit(p); };
    row.querySelector('.par').onclick  = function() { openEdit(p); };
    row.querySelector('.pai').onclick  = function() { openEdit(p); };

    // delete btn
    row.querySelector('.del-btn').onclick = function(e) {
      e.stopPropagation();
      if (confirm('Supprimer "' + p.name + '" ?')) {
        GS.AdminDelete(String(p.id));
      }
    };

    el.appendChild(row);
  });
}

// ── Save all ──
function saveAll() {
  var payload = {
    config: {
      name:         document.getElementById('cfg-name').value,
      job:          document.getElementById('cfg-job').value,
      open:         _togState.open,
      stockLimited: _togState.stock,
      autoRestock:  _togState.restock,
    }
  };
  GS.AdminSave(JSON.stringify(payload));
}

// ── Edit product modal ──
function openEdit(p) {
  _editId = p ? p.id : null;
  document.getElementById('edit-title').textContent = p ? 'Modifier le produit' : 'Ajouter un produit';
  document.getElementById('edit-id').value    = p ? p.id    : '';
  document.getElementById('edit-emoji').value = p ? p.emoji : '📦';
  document.getElementById('edit-cat').value   = p ? p.category : '';
  document.getElementById('edit-name').value  = p ? p.name     : '';
  document.getElementById('edit-item').value  = p ? p.item_name: '';
  document.getElementById('edit-desc').value  = p ? p.description : '';
  document.getElementById('edit-price').value = p ? p.price.toFixed(2) : '';
  document.getElementById('edit-stock').value = p ? p.stock : '';
  document.getElementById('edit-overlay').classList.add('show');
}

function closeEdit() {
  document.getElementById('edit-overlay').classList.remove('show');
}

function saveProduct() {
  var payload = {
    id:          _editId ? Number(_editId) : 0,
    emoji:       document.getElementById('edit-emoji').value || '📦',
    category:    document.getElementById('edit-cat').value   || 'misc',
    name:        document.getElementById('edit-name').value,
    item_name:   document.getElementById('edit-item').value,
    description: document.getElementById('edit-desc').value  || '',
    price:       parseFloat(document.getElementById('edit-price').value) || 0,
    stock:       parseInt(document.getElementById('edit-stock').value)   || 0,
    active:      true,
  };

  if (!payload.name || !payload.item_name) {
    showToast('Nom et item GXD requis.', 'err'); return;
  }

  if (_editId) {
    // Modification : envoie comme save global avec juste ce produit
    GS.AdminSave(JSON.stringify({ products: [payload] }));
  } else {
    GS.AdminAdd(JSON.stringify(payload));
  }
  closeEdit();
}

// ── Toast ──
var _tt = null;
function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type || '');
  clearTimeout(_tt);
  _tt = setTimeout(function() { el.className = ''; }, 3000);
}

// ── Init ──
window.onload = function() {
  GS.AdminReady();
};
</script>
</body>
</html>
