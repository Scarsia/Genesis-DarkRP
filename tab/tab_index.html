<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

::-webkit-scrollbar{display:none;}
html{scrollbar-width:none;}

html,body{
    width:100%;height:100%;overflow:hidden;
    margin:0;padding:0;background:transparent;
    color:#e8eaf0;font-family:'Segoe UI',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    user-select:none;-webkit-user-select:none;
}

/* ── GLASS TOKENS (from genesis_banking) ── */
.glass{background:rgba(255,255,255,0.03);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid rgba(255,255,255,0.08);border-radius:16px;}
.glass-sm{background:rgba(255,255,255,0.025);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:0.5px solid rgba(255,255,255,0.06);border-radius:10px;}

/* ── MAIN CONTAINER ── */
.gt{
    width:100%;height:100%;
    display:flex;flex-direction:column;
    padding:12px 14px 10px;
    opacity:0;transition:opacity 0.2s ease;
}
.gt.visible{opacity:1;}

/* ── HEADER ── */
.gt-head{
    display:flex;align-items:flex-start;justify-content:space-between;
    margin-bottom:8px;flex-shrink:0;
}
.gt-title{font-size:13px;font-weight:600;letter-spacing:.18em;color:#c8ccd8;text-transform:uppercase;}
.gt-sub{font-size:11px;color:#6a7890;margin-top:2px;}
.gt-right{text-align:right;}
.gt-online{font-size:10px;color:#6a7890;letter-spacing:.1em;text-transform:uppercase;}
.gt-dot{
    display:inline-block;width:6px;height:6px;border-radius:50%;
    background:#22b960;margin-right:4px;vertical-align:middle;
    box-shadow:0 0 6px rgba(34,185,96,0.4);
}

/* ── STATS BAR ── */
.gt-stats{
    display:flex;gap:8px;margin-bottom:8px;flex-shrink:0;
}
.gt-stat{
    flex:1;padding:10px 12px;
}
.gt-stat-label{font-size:10px;letter-spacing:.2em;color:#6a7890;text-transform:uppercase;}
.gt-stat-val{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.5px;margin-top:2px;}
.gt-stat-unit{font-size:10px;color:#6a7890;font-weight:400;}
.gt-stat-val.accent-green{color:#22b960;}
.gt-stat-val.accent-purple{color:#b8bcc8;}

/* ── SECTION LABEL ── */
.gt-section{
    font-size:10px;letter-spacing:.2em;color:#6a7890;
    text-transform:uppercase;margin-bottom:6px;flex-shrink:0;
}

/* ── PLAYER LIST ── */
.gt-list{
    flex:1;overflow-y:auto;overflow-x:hidden;
    display:flex;flex-direction:column;gap:3px;
    min-height:0;
}

/* ── PLAYER ROW ── */
.gt-row{
    display:flex;align-items:center;
    padding:7px 10px;border-radius:10px;
    cursor:pointer;transition:all .18s;
    position:relative;flex-shrink:0;
    background:rgba(255,255,255,0.025);
    border:0.5px solid rgba(255,255,255,0.05);
}
.gt-row:hover{
    background:rgba(255,255,255,0.045);
    border-color:rgba(255,255,255,0.09);
}
.gt-row.is-self{
    background:rgba(255,255,255,0.05);
    border-color:rgba(184,188,200,0.2);
}
.gt-row.is-self::before{
    content:'';position:absolute;left:0;top:0;bottom:0;
    width:3px;background:#b8bcc8;border-radius:0;
}
.gt-row.is-self .gt-name{color:#fff;}

.gt-avatar{
    width:36px;height:36px;border-radius:8px;
    background:rgba(255,255,255,0.06);
    margin-right:12px;flex-shrink:0;overflow:hidden;
}
.gt-avatar img{width:100%;height:100%;object-fit:cover;display:block;}

.gt-name{
    font-size:13px;font-weight:500;color:#c8ccd8;
    flex:1;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;line-height:1;
}

.gt-staff-badge{
    font-size:8px;font-weight:600;letter-spacing:1.5px;
    text-transform:uppercase;color:#b8bcc8;margin-right:10px;
    background:rgba(184,188,200,0.08);
    border:0.5px solid rgba(184,188,200,0.2);
    padding:2px 7px;border-radius:6px;
}

.gt-ping{
    display:flex;align-items:center;gap:5px;
    min-width:34px;justify-content:flex-end;
}
.gt-ping-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.gt-ping-val{font-size:11px;color:#6a7890;font-weight:500;}

/* ── CONTEXT MENU ── */
.gt-ctx-overlay{
    display:none;position:fixed;
    top:0;left:0;right:0;bottom:0;z-index:90;
}
.gt-ctx-overlay.open{display:block;}

.gt-ctx{
    position:fixed;
    background:rgba(12,12,16,0.96);
    backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;padding:5px 0;
    min-width:190px;z-index:100;display:none;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}
.gt-ctx.open{display:block;}

.gt-ctx-head{
    padding:9px 16px 7px;
    font-size:10px;letter-spacing:.15em;
    color:#6a7890;text-transform:uppercase;
    border-bottom:0.5px solid rgba(255,255,255,0.06);
    margin-bottom:2px;
}
.gt-ctx-item{
    padding:9px 16px;font-size:12px;font-weight:500;
    color:#7a8498;cursor:pointer;
    transition:all .18s;letter-spacing:.03em;
}
.gt-ctx-item:hover{
    background:rgba(255,255,255,0.04);color:#c8ccd8;
}
.gt-ctx-sep{height:1px;background:rgba(255,255,255,0.05);margin:3px 0;}
.gt-ctx-item.accent{color:#b8bcc8;}
.gt-ctx-item.accent:hover{
    background:rgba(184,188,200,0.06);color:#e0e4ef;
}
.gt-ctx-item.danger{color:#c05050;}
.gt-ctx-item.danger:hover{
    color:#e06060;background:rgba(180,50,50,0.06);
}

/* ── FOOTER ── */
.gt-foot{
    margin-top:6px;display:flex;justify-content:space-between;
    font-size:9px;letter-spacing:.12em;
    color:#4a5870;text-transform:uppercase;flex-shrink:0;
}

/* ── PING COLORS ── */
.ping-good{background:#22b960;box-shadow:0 0 4px rgba(34,185,96,0.3);}
.ping-mid{background:#d4a030;box-shadow:0 0 4px rgba(212,160,48,0.3);}
.ping-bad{background:#d03030;box-shadow:0 0 4px rgba(208,48,48,0.3);}
</style>
</head>
<body>

<div class="gt" id="gtMain">

    <!-- HEADER -->
    <div class="gt-head">
        <div>
            <div class="gt-title">Sessions</div>
            <div class="gt-sub">Genesis Network</div>
        </div>
        <div class="gt-right">
            <div class="gt-online"><span class="gt-dot"></span>En ligne</div>
        </div>
    </div>

    <!-- STATS -->
    <div class="gt-stats">
        <div class="gt-stat glass-sm">
            <div class="gt-stat-label">Ping</div>
            <div class="gt-stat-val accent-green" id="statPing">
                — <span class="gt-stat-unit">ms</span>
            </div>
        </div>
        <div class="gt-stat glass-sm">
            <div class="gt-stat-label">Staff</div>
            <div class="gt-stat-val accent-purple" id="statStaff">
                0 <span class="gt-stat-unit">en ligne</span>
            </div>
        </div>
        <div class="gt-stat glass-sm">
            <div class="gt-stat-label">Joueurs</div>
            <div class="gt-stat-val" id="statPlayers">
                0 <span class="gt-stat-unit">/ 64</span>
            </div>
        </div>
    </div>

    <!-- SECTION -->
    <div class="gt-section">Joueurs connectés</div>

    <!-- PLAYER LIST -->
    <div class="gt-list" id="playerList"></div>

    <!-- FOOTER -->
    <div class="gt-foot">
        <div>genesis-network.fr</div>
        <div>Clic &rarr; options</div>
    </div>
</div>

<!-- CONTEXT MENU -->
<div class="gt-ctx-overlay" id="ctxOverlay"></div>
<div class="gt-ctx" id="ctxMenu"></div>

<script>
/* ================================================================
   GENESIS TAB — ES5 COMPATIBLE
   Same bridge pattern as genesis_banking
   ================================================================ */

/* === VIEWPORT SCALE (same as banking) === */
(function(){
    var zoom = Math.max(0.82, Math.min(window.innerWidth / 1380, 2.2));
    document.body.style.zoom = zoom;
})();

var GT = {};
GT.players    = [];
GT.selfSid64  = "";
GT.isAdmin    = false;
GT.maxPlayers = 64;

function pingClass(p) {
    if (p < 60) return "ping-good";
    if (p < 100) return "ping-mid";
    return "ping-bad";
}

/* ── RENDER ── */
function renderPlayers() {
    var list = document.getElementById("playerList");
    var html = "";

    for (var i = 0; i < GT.players.length; i++) {
        var p = GT.players[i];
        var isSelf  = (p.sid64 === GT.selfSid64);
        var selfCls = isSelf ? " is-self" : "";

        html += '<div class="gt-row' + selfCls + '" data-idx="' + i + '">';

        html += '<div class="gt-avatar">';
        if (p.avatar) {
            html += '<img src="' + p.avatar + '" onerror="this.style.display=\'none\'">';
        }
        html += '</div>';

        html += '<div class="gt-name">' + escapeHtml(p.name) + '</div>';

        if (p.is_staff) {
            html += '<div class="gt-staff-badge">Staff</div>';
        }

        html += '<div class="gt-ping">';
        html += '<span class="gt-ping-dot ' + pingClass(p.ping) + '"></span>';
        html += '<span class="gt-ping-val">' + p.ping + '</span>';
        html += '</div>';

        html += '</div>';
    }

    list.innerHTML = html;

    var rows = list.querySelectorAll(".gt-row");
    for (var j = 0; j < rows.length; j++) {
        (function(row) {
            row.addEventListener("click", function(e) {
                var idx = parseInt(row.getAttribute("data-idx"), 10);
                openCtx(e, GT.players[idx]);
            });
        })(rows[j]);
    }
}

function updateStats() {
    var selfPing = 0;
    var staffCount = 0;

    for (var i = 0; i < GT.players.length; i++) {
        if (GT.players[i].sid64 === GT.selfSid64) selfPing = GT.players[i].ping;
        if (GT.players[i].is_staff) staffCount++;
    }

    document.getElementById("statPing").innerHTML =
        selfPing + ' <span class="gt-stat-unit">ms</span>';
    document.getElementById("statStaff").innerHTML =
        staffCount + ' <span class="gt-stat-unit">en ligne</span>';
    document.getElementById("statPlayers").innerHTML =
        GT.players.length + ' <span class="gt-stat-unit">/ ' + GT.maxPlayers + '</span>';
}

/* ── CONTEXT MENU ── */
function openCtx(e, player) {
    var menu = document.getElementById("ctxMenu");
    var overlay = document.getElementById("ctxOverlay");
    var html = "";

    html += '<div class="gt-ctx-head">' + escapeHtml(player.name) + '</div>';
    html += '<div class="gt-ctx-item accent" data-act="copy_steamid">Copier SteamID</div>';
    html += '<div class="gt-ctx-item" data-act="open_profile">Profil Steam</div>';

    if (GT.isAdmin) {
        html += '<div class="gt-ctx-sep"></div>';
        html += '<div class="gt-ctx-item" data-act="goto">Téléporter vers</div>';
        html += '<div class="gt-ctx-item" data-act="bring">Amener à soi</div>';
        html += '<div class="gt-ctx-item" data-act="spectate">Spectate</div>';
        html += '<div class="gt-ctx-sep"></div>';
        html += '<div class="gt-ctx-item" data-act="freeze">Freeze</div>';
        html += '<div class="gt-ctx-item" data-act="unfreeze">Unfreeze</div>';
        html += '<div class="gt-ctx-item" data-act="jail">Jail</div>';
        html += '<div class="gt-ctx-sep"></div>';
        html += '<div class="gt-ctx-item danger" data-act="kick">Kick</div>';
        html += '<div class="gt-ctx-item danger" data-act="ban">Ban</div>';
    } else {
        html += '<div class="gt-ctx-sep"></div>';
        html += '<div class="gt-ctx-item danger" data-act="report">Signaler</div>';
    }

    menu.innerHTML = html;

    var x = e.clientX;
    var y = e.clientY;
    menu.style.left = x + "px";
    menu.style.top  = y + "px";

    menu.classList.add("open");
    overlay.classList.add("open");

    var rect = menu.getBoundingClientRect();
    if (rect.right > window.innerWidth) {
        menu.style.left = (window.innerWidth - rect.width - 8) + "px";
    }
    if (rect.bottom > window.innerHeight) {
        menu.style.top = (window.innerHeight - rect.height - 8) + "px";
    }

    var items = menu.querySelectorAll(".gt-ctx-item");
    for (var i = 0; i < items.length; i++) {
        (function(item) {
            item.addEventListener("click", function(ev) {
                ev.stopPropagation();
                var act = item.getAttribute("data-act");
                closeCtx();
                sendAction(act, player);
            });
        })(items[i]);
    }
}

function closeCtx() {
    document.getElementById("ctxMenu").classList.remove("open");
    document.getElementById("ctxOverlay").classList.remove("open");
}

document.getElementById("ctxOverlay").addEventListener("click", closeCtx);

function sendAction(action, player) {
    var payload = JSON.stringify({
        action: action,
        name:   player.name,
        sid:    player.sid,
        sid64:  player.sid64
    });
    try { GN.Receive(payload); }
    catch(err) { console.log("GN.Receive:", payload); }
}

function escapeHtml(str) {
    var div = document.createElement("div");
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
}

/* ================================================================
   PUBLIC API — called from Lua via RunJavascript
   ================================================================ */

function GT_Update(json) {
    try {
        var data = (typeof json === "string") ? JSON.parse(json) : json;
        if (data.self_sid64 !== undefined) GT.selfSid64  = data.self_sid64;
        if (data.is_admin  !== undefined) GT.isAdmin     = data.is_admin;
        if (data.max_players !== undefined) GT.maxPlayers = data.max_players;
        if (data.players) GT.players = data.players;
        renderPlayers();
        updateStats();
    } catch(err) { console.error("GT_Update error:", err); }
}

function GT_Show() {
    document.getElementById("gtMain").classList.add("visible");
}

function GT_Hide() {
    document.getElementById("gtMain").classList.remove("visible");
    closeCtx();
}
</script>
</body>
</html>
