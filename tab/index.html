<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: 'Rajdhani', 'Segoe UI', sans-serif;
    color: #c8cbd6;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
}

/* ── MAIN CONTAINER ── */
.gt {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    background: rgba(10, 10, 10, 0.92);
    opacity: 0;
    transition: opacity 0.2s ease;
}
.gt.visible { opacity: 1; }

/* ── HEADER ── */
.gt-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px 0;
    flex-shrink: 0;
}
.gt-sub {
    font-size: 10px; letter-spacing: 4px;
    text-transform: uppercase; color: #444;
}
.gt-logo {
    font-size: 20px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: #e0e2e8;
}
.gt-logo span { color: #555; }
.gt-online {
    font-size: 11px; color: #6a6e7a; letter-spacing: 1px;
}
.gt-dot {
    display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
    background: #6a8a5a; margin-right: 5px;
    vertical-align: middle;
}

/* ── STATS BAR ── */
.gt-stats {
    display: flex; gap: 16px;
    padding: 14px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    flex-shrink: 0;
}
.gt-stat {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border-radius: 6px; padding: 10px 14px;
}
.gt-stat-label {
    font-size: 9px; letter-spacing: 3px;
    text-transform: uppercase; color: #3a3a3a;
}
.gt-stat-val {
    font-size: 18px; font-weight: 600; margin-top: 2px;
}
.gt-stat-unit { font-size: 10px; color: #444; }

/* ── SECTION HEADER ── */
.gt-section {
    padding: 14px 24px 6px;
    font-size: 9px; letter-spacing: 4px;
    text-transform: uppercase; color: #3a3a3a;
    flex-shrink: 0;
}

/* ── PLAYER LIST ── */
.gt-list {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 2px 16px 10px;
}
.gt-list::-webkit-scrollbar { width: 3px; }
.gt-list::-webkit-scrollbar-track { background: transparent; }
.gt-list::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.08); border-radius: 3px;
}

/* ── PLAYER ROW ── */
.gt-row {
    display: flex; align-items: center;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s ease;
    position: relative;
    margin-bottom: 1px;
}
.gt-row:hover { background: rgba(255,255,255,0.04); }
.gt-row.is-self .gt-name { color: #8aad6a; }

.gt-avatar {
    width: 36px; height: 36px;
    border-radius: 5px;
    background: rgba(255,255,255,0.06);
    margin-right: 12px; flex-shrink: 0;
    overflow: hidden;
}
.gt-avatar img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
}

.gt-name {
    font-size: 15px; font-weight: 600;
    color: #c8cbd6; flex: 1;
    white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1;
}

.gt-staff-badge {
    font-size: 9px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: #8a8abd; margin-right: 12px;
    background: rgba(138,138,189,0.1);
    padding: 2px 7px; border-radius: 3px;
}

.gt-ping {
    display: flex; align-items: center; gap: 5px;
    min-width: 36px; justify-content: flex-end;
}
.gt-ping-dot {
    width: 6px; height: 6px;
    border-radius: 50%; flex-shrink: 0;
}
.gt-ping-val {
    font-size: 11px; color: #444;
    font-weight: 500;
}

/* ── CONTEXT MENU ── */
.gt-ctx-overlay {
    display: none; position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 90;
}
.gt-ctx-overlay.open { display: block; }

.gt-ctx {
    position: fixed;
    background: rgba(14, 14, 16, 0.97);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px;
    padding: 5px 0;
    min-width: 190px;
    z-index: 100;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.gt-ctx.open { display: block; }

.gt-ctx-head {
    padding: 8px 16px 6px;
    font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: #333;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    margin-bottom: 2px;
}
.gt-ctx-item {
    padding: 9px 16px;
    font-size: 13px; font-weight: 500;
    color: #777; cursor: pointer;
    transition: background 0.1s, color 0.1s;
    letter-spacing: 0.3px;
}
.gt-ctx-item:hover {
    background: rgba(255,255,255,0.05);
    color: #c8cbd6;
}
.gt-ctx-sep {
    height: 1px;
    background: rgba(255,255,255,0.05);
    margin: 4px 0;
}
.gt-ctx-item.danger { color: #7a4444; }
.gt-ctx-item.danger:hover {
    color: #c46a5a;
    background: rgba(140,60,50,0.08);
}

/* ── FOOTER ── */
.gt-foot {
    border-top: 1px solid rgba(255,255,255,0.04);
    padding: 10px 24px;
    display: flex; justify-content: space-between;
    font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; color: #2a2a2a;
    flex-shrink: 0;
}

/* ── PING COLORS ── */
.ping-good { background: #5a7a4a; }
.ping-mid  { background: #7a6a3a; }
.ping-bad  { background: #7a3a3a; }
</style>
</head>
<body>

<div class="gt" id="gtMain">

    <!-- HEADER -->
    <div class="gt-head">
        <div>
            <div class="gt-sub">Serveur</div>
            <div class="gt-logo">GENESIS <span>NETWORK</span></div>
        </div>
        <div style="text-align:right">
            <div class="gt-online"><span class="gt-dot"></span>En ligne</div>
        </div>
    </div>

    <!-- STATS -->
    <div class="gt-stats">
        <div class="gt-stat">
            <div class="gt-stat-label">Votre ping</div>
            <div class="gt-stat-val" id="statPing" style="color:#8aad6a">
                — <span class="gt-stat-unit">ms</span>
            </div>
        </div>
        <div class="gt-stat">
            <div class="gt-stat-label">Staff</div>
            <div class="gt-stat-val" id="statStaff" style="color:#8a8abd">
                0 <span class="gt-stat-unit">en ligne</span>
            </div>
        </div>
        <div class="gt-stat">
            <div class="gt-stat-label">Joueurs</div>
            <div class="gt-stat-val" id="statPlayers" style="color:#c8cbd6">
                0 <span class="gt-stat-unit">/ 64</span>
            </div>
        </div>
    </div>

    <!-- SECTION -->
    <div class="gt-section">Sessions</div>

    <!-- PLAYER LIST -->
    <div class="gt-list" id="playerList"></div>

    <!-- FOOTER -->
    <div class="gt-foot">
        <div>genesis-network.fr</div>
        <div>Clic &rarr; options</div>
    </div>
</div>

<!-- CONTEXT MENU OVERLAY -->
<div class="gt-ctx-overlay" id="ctxOverlay"></div>
<div class="gt-ctx" id="ctxMenu"></div>

<script>
/* ================================================================
   GENESIS TAB — ES5 COMPATIBLE
   Bridge: GN.Receive(jsonString) → Lua
   Lua→JS: GT_Update(jsonString), GT_Show(), GT_Hide()
   ================================================================ */

var GT = {};
GT.players   = [];
GT.selfSid64 = "";
GT.isAdmin   = false;
GT.maxPlayers = 64;

/* ── PING HELPER ── */
function pingClass(p) {
    if (p < 60) return "ping-good";
    if (p < 100) return "ping-mid";
    return "ping-bad";
}

function pingColor(p) {
    if (p < 60) return "#5a7a4a";
    if (p < 100) return "#7a6a3a";
    return "#7a3a3a";
}

/* ── RENDER PLAYER LIST ── */
function renderPlayers() {
    var list = document.getElementById("playerList");
    var html = "";

    for (var i = 0; i < GT.players.length; i++) {
        var p = GT.players[i];
        var isSelf  = (p.sid64 === GT.selfSid64);
        var selfCls = isSelf ? " is-self" : "";

        html += '<div class="gt-row' + selfCls + '" data-idx="' + i + '">';

        /* avatar */
        html += '<div class="gt-avatar">';
        if (p.avatar) {
            html += '<img src="' + p.avatar + '" onerror="this.style.display=\'none\'">';
        }
        html += '</div>';

        /* name */
        html += '<div class="gt-name">' + escapeHtml(p.name) + '</div>';

        /* staff badge */
        if (p.is_staff) {
            html += '<div class="gt-staff-badge">Staff</div>';
        }

        /* ping */
        html += '<div class="gt-ping">';
        html += '<span class="gt-ping-dot ' + pingClass(p.ping) + '"></span>';
        html += '<span class="gt-ping-val" style="color:' + pingColor(p.ping) + '">' + p.ping + '</span>';
        html += '</div>';

        html += '</div>';
    }

    list.innerHTML = html;

    /* bind clicks */
    var rows = list.querySelectorAll(".gt-row");
    for (var j = 0; j < rows.length; j++) {
        (function(row) {
            row.addEventListener("click", function(e) {
                var idx = parseInt(row.getAttribute("data-idx"), 10);
                openCtx(e, GT.players[idx]);
            });
        })(rows[j]);
    }
}

/* ── UPDATE STATS ── */
function updateStats() {
    var selfPing = 0;
    var staffCount = 0;

    for (var i = 0; i < GT.players.length; i++) {
        if (GT.players[i].sid64 === GT.selfSid64) {
            selfPing = GT.players[i].ping;
        }
        if (GT.players[i].is_staff) {
            staffCount++;
        }
    }

    document.getElementById("statPing").innerHTML =
        selfPing + ' <span class="gt-stat-unit">ms</span>';
    document.getElementById("statStaff").innerHTML =
        staffCount + ' <span class="gt-stat-unit">en ligne</span>';
    document.getElementById("statPlayers").innerHTML =
        GT.players.length + ' <span class="gt-stat-unit">/ ' + GT.maxPlayers + '</span>';
}

/* ── CONTEXT MENU ── */
function openCtx(e, player) {
    var menu = document.getElementById("ctxMenu");
    var overlay = document.getElementById("ctxOverlay");
    var html = "";

    html += '<div class="gt-ctx-head">' + escapeHtml(player.name) + '</div>';
    html += '<div class="gt-ctx-item" data-act="copy_steamid">Copier SteamID</div>';
    html += '<div class="gt-ctx-item" data-act="open_profile">Profil Steam</div>';

    if (GT.isAdmin) {
        html += '<div class="gt-ctx-sep"></div>';
        html += '<div class="gt-ctx-item" data-act="goto">Téléporter vers</div>';
        html += '<div class="gt-ctx-item" data-act="bring">Amener à soi</div>';
        html += '<div class="gt-ctx-item" data-act="spectate">Spectate</div>';
        html += '<div class="gt-ctx-sep"></div>';
        html += '<div class="gt-ctx-item" data-act="freeze">Freeze</div>';
        html += '<div class="gt-ctx-item" data-act="unfreeze">Unfreeze</div>';
        html += '<div class="gt-ctx-item" data-act="jail">Jail</div>';
        html += '<div class="gt-ctx-sep"></div>';
        html += '<div class="gt-ctx-item danger" data-act="kick">Kick</div>';
        html += '<div class="gt-ctx-item danger" data-act="ban">Ban</div>';
    } else {
        html += '<div class="gt-ctx-sep"></div>';
        html += '<div class="gt-ctx-item danger" data-act="report">Signaler</div>';
    }

    menu.innerHTML = html;

    /* position near click */
    var x = e.clientX;
    var y = e.clientY;
    menu.style.left = x + "px";
    menu.style.top  = y + "px";

    menu.classList.add("open");
    overlay.classList.add("open");

    /* clamp to viewport */
    var rect = menu.getBoundingClientRect();
    if (rect.right > window.innerWidth) {
        menu.style.left = (window.innerWidth - rect.width - 8) + "px";
    }
    if (rect.bottom > window.innerHeight) {
        menu.style.top = (window.innerHeight - rect.height - 8) + "px";
    }

    /* bind actions */
    var items = menu.querySelectorAll(".gt-ctx-item");
    for (var i = 0; i < items.length; i++) {
        (function(item) {
            item.addEventListener("click", function(ev) {
                ev.stopPropagation();
                var act = item.getAttribute("data-act");
                closeCtx();
                sendAction(act, player);
            });
        })(items[i]);
    }
}

function closeCtx() {
    document.getElementById("ctxMenu").classList.remove("open");
    document.getElementById("ctxOverlay").classList.remove("open");
}

document.getElementById("ctxOverlay").addEventListener("click", closeCtx);

/* ── SEND ACTION TO LUA ── */
function sendAction(action, player) {
    var payload = JSON.stringify({
        action: action,
        name:   player.name,
        sid:    player.sid,
        sid64:  player.sid64
    });

    try {
        GN.Receive(payload);
    } catch(err) {
        /* fallback for testing outside GMod */
        console.log("GN.Receive:", payload);
    }
}

/* ── HTML ESCAPE ── */
function escapeHtml(str) {
    var div = document.createElement("div");
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
}

/* ================================================================
   PUBLIC API — called from Lua via RunJavascript
   ================================================================ */

/**
 * GT_Update(jsonString)
 * Full data push: players, self info, admin status, max slots
 * {
 *   self_sid64: "765...",
 *   is_admin: true,
 *   max_players: 64,
 *   players: [
 *     { name, sid, sid64, ping, avatar, is_staff }
 *   ]
 * }
 */
function GT_Update(json) {
    try {
        var data = (typeof json === "string") ? JSON.parse(json) : json;

        if (data.self_sid64 !== undefined) GT.selfSid64  = data.self_sid64;
        if (data.is_admin  !== undefined) GT.isAdmin     = data.is_admin;
        if (data.max_players !== undefined) GT.maxPlayers = data.max_players;
        if (data.players) GT.players = data.players;

        renderPlayers();
        updateStats();
    } catch(err) {
        console.error("GT_Update error:", err);
    }
}

function GT_Show() {
    document.getElementById("gtMain").classList.add("visible");
}

function GT_Hide() {
    document.getElementById("gtMain").classList.remove("visible");
    closeCtx();
}
</script>
</body>
</html>
