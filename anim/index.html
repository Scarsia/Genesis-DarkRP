<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c69643;--gold-dim:rgba(198,150,67,0.15);--gold-border:rgba(198,150,67,0.28);
  --silver:#c8cbd6;--text:#f0f0f5;--dim:#8a8e9a;
  --bg:rgba(10,11,16,0.97);--border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.13);
}
html,body{width:100%;height:100%;font-family:'Rajdhani',sans-serif;background:transparent;color:var(--text);overflow:hidden}
#root{width:100%;height:100%;display:flex;align-items:center;justify-content:flex-start;padding-left:52px}
#panel{
  width:420px;height:min(780px,92vh);
  display:flex;flex-direction:column;
  background:var(--bg);
  border:1px solid var(--border);border-top:1px solid rgba(255,255,255,0.10);
  border-radius:4px;
  box-shadow:0 40px 100px rgba(0,0,0,0.75);
  overflow:hidden;position:relative;
}
#panel::before,#panel::after{content:'';position:absolute;pointer-events:none;background:var(--gold);opacity:0.5}
#panel::before{top:0;left:0;width:36px;height:1px}
#panel::after{top:0;left:0;width:1px;height:36px}
#header{padding:20px 24px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
#eyebrow{font-size:10px;font-weight:700;letter-spacing:.35em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
#title-row{display:flex;align-items:center;justify-content:space-between}
#title{font-size:24px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
#close-btn{
  appearance:none;border:1px solid var(--border);cursor:pointer;
  background:rgba(255,255,255,0.04);color:var(--dim);
  font:700 11px 'Rajdhani',sans-serif;letter-spacing:.22em;text-transform:uppercase;
  padding:6px 14px;border-radius:3px;
}
#close-btn:hover{border-color:var(--border-h);color:var(--text)}
#subtitle{font-size:12px;color:var(--dim);margin-top:5px;letter-spacing:.02em;line-height:1.3}
#toolbar{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:rgba(255,255,255,0.015)}
#search-wrap{flex:1;position:relative;height:38px}
#search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:13px;height:13px;fill:var(--dim);pointer-events:none}
#search{width:100%;height:100%;border:1px solid var(--border);outline:none;background:rgba(255,255,255,0.03);color:var(--text);padding:0 12px 0 36px;font:600 14px 'Rajdhani',sans-serif;border-radius:3px;transition:border-color .15s}
#search:focus{border-color:rgba(255,255,255,0.15)}
#search::placeholder{color:var(--dim)}
#count{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);white-space:nowrap;flex-shrink:0}
#list-wrap{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 24px 16px}
#list-wrap::-webkit-scrollbar{width:3px}
#list-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.10);border-radius:2px}
.anim-row{
  display:grid;grid-template-columns:24px 1fr auto auto;align-items:center;gap:0;
  padding:0 12px;height:50px;border:1px solid var(--border);border-radius:3px;margin-bottom:5px;
  background:rgba(255,255,255,0.02);cursor:pointer;
  transition:background .10s,border-color .10s;
}
.anim-row:hover,.anim-row.hovered{background:rgba(255,255,255,0.05);border-color:var(--border-h)}
.anim-row.active{border-color:var(--gold-border);background:rgba(198,150,67,0.07)}
.anim-num{font-size:10px;font-weight:700;color:var(--dim);padding-right:10px}
.anim-info{min-width:0}
.anim-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.anim-tags{display:flex;gap:5px;margin-top:1px}
.tag{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:2px 6px;border-radius:2px}
.tag-premium{color:var(--gold);background:var(--gold-dim);border:1px solid var(--gold-border)}
.tag-fav{color:var(--silver);background:rgba(200,203,214,0.08);border:1px solid rgba(200,203,214,0.18)}
.row-actions{display:flex;gap:5px;margin-left:10px}
.btn-fav,.btn-play{appearance:none;border:0;cursor:pointer;border-radius:3px;font:700 11px 'Rajdhani',sans-serif;letter-spacing:.10em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;transition:background .12s,border-color .12s}
.btn-fav{width:32px;height:32px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--dim);font-size:14px}
.btn-fav:hover{border-color:var(--gold-border);color:var(--gold)}
.btn-fav.active{background:var(--gold-dim);border-color:var(--gold-border);color:var(--gold)}
.btn-play{height:32px;padding:0 12px;background:rgba(198,150,67,0.12);border:1px solid var(--gold-border);color:var(--gold);font-size:11px}
.btn-play:hover{background:rgba(198,150,67,0.22);border-color:rgba(198,150,67,0.50)}
#empty{display:none;text-align:center;padding:50px 20px}
#empty h3{font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin-bottom:6px}
#empty p{font-size:13px;color:var(--dim)}
#footer{padding:11px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:rgba(255,255,255,0.010)}
#hint,#status{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--dim)}
</style>
</head>
<body>
<div id="root">
  <div id="panel">
    <div id="header">
      <div id="eyebrow">Genesis Network</div>
      <div id="title-row">
        <div id="title">Animations</div>
        <button id="close-btn">Fermer</button>
      </div>
      <div id="subtitle">Survole une animation pour la prévisualiser.</div>
    </div>
    <div id="toolbar">
      <div id="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" stroke-width="2" stroke="currentColor" fill="none"/><path d="m21 21-4.35-4.35" stroke-width="2" stroke="currentColor"/></svg>
        <input id="search" type="text" placeholder="Rechercher...">
      </div>
      <div id="count">0 anims</div>
    </div>
    <div id="list-wrap">
      <div id="list"></div>
      <div id="empty"><h3>Aucune animation</h3><p id="empty-sub">Essaie un autre mot-clé.</p></div>
    </div>
    <div id="footer">
      <div id="hint">★ favori · survol = aperçu</div>
      <div id="status">Prêt</div>
    </div>
  </div>
</div>

<script>
var S = {items:[],search:'',emptySub:'Essaie un autre mot-clé.',closeKey:'F9'};

function gmodCall(ns,fn){
  var args=Array.prototype.slice.call(arguments,2);
  try{
    var obj=window[ns]||(window.gmod&&window.gmod[ns]);
    if(obj&&typeof obj[fn]==='function') obj[fn].apply(null,args);
  }catch(e){}
}
function esc(v){
  return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function getFiltered(){
  var q=(S.search||'').trim().toLowerCase();
  var out=S.items.slice();
  if(q) out=out.filter(function(it){return (it.search||(it.name+' '+it.key)).toLowerCase().indexOf(q)>=0;});
  out.sort(function(a,b){
    var fa=a.favorite?1:0,fb=b.favorite?1:0;
    if(fa!==fb) return fb-fa;
    return (Number(a.id)||0)-(Number(b.id)||0);
  });
  return out;
}
function render(){
  var items=getFiltered();
  var list=document.getElementById('list');
  var empty=document.getElementById('empty');
  document.getElementById('count').textContent=items.length+' anim'+(items.length>1?'s':'');
  if(!items.length){list.innerHTML='';empty.style.display='block';document.getElementById('empty-sub').textContent=S.emptySub;return;}
  empty.style.display='none';
  list.innerHTML=items.map(function(it,i){
    var tags='';
    if(it.premium) tags+='<span class="tag tag-premium">Premium</span>';
    if(it.favorite) tags+='<span class="tag tag-fav">Favori</span>';
    return '<div class="anim-row" data-key="'+esc(it.key)+'" data-index="'+i+'">'
      +'<div class="anim-num">'+(i+1)+'</div>'
      +'<div class="anim-info"><div class="anim-name">'+esc(it.name)+'</div>'+(tags?'<div class="anim-tags">'+tags+'</div>':'')+'</div>'
      +'<div class="row-actions">'
        +'<button class="btn-fav'+(it.favorite?' active':'')+'" data-action="fav" data-key="'+esc(it.key)+'">★</button>'
        +'<button class="btn-play" data-action="play" data-key="'+esc(it.key)+'">JOUER</button>'
      +'</div>'
    +'</div>';
  }).join('');
}
function wire(){
  document.getElementById('close-btn').onclick=function(){gmodCall('anim_ui','closeMenu');};
  document.getElementById('search').oninput=function(e){S.search=e.target.value||'';render();};
  var list=document.getElementById('list');
  list.addEventListener('mouseover',function(e){
    var row=e.target.closest('.anim-row');
    if(!row) return;
    var key=row.dataset.key||'';
    if(!key) return;
    document.querySelectorAll('.anim-row.hovered').forEach(function(r){r.classList.remove('hovered');});
    row.classList.add('hovered');
    gmodCall('anim_ui','previewAnimation',key);
  });
  list.addEventListener('click',function(e){
    var btn=e.target.closest('[data-action]');
    if(!btn) return;
    var key=btn.dataset.key||'';
    if(!key) return;
    if(btn.dataset.action==='fav'){
      var it=S.items.find(function(x){return String(x.key)===String(key);});
      if(!it) return;
      it.favorite=!it.favorite;
      render();
      gmodCall('anim_ui','toggleFavorite',key,it.favorite?'1':'0');
    } else if(btn.dataset.action==='play'){
      document.querySelectorAll('.anim-row.active').forEach(function(r){r.classList.remove('active');});
      var row=btn.closest('.anim-row');
      if(row) row.classList.add('active');
      document.getElementById('status').textContent='Lecture...';
      gmodCall('anim_ui','playAnimation',key);
    }
  });
  document.addEventListener('keydown',function(e){if(e.key==='Escape') gmodCall('anim_ui','closeMenu');});
}
window.GA_Bootstrap=function(payload){
  if(!payload) return;
  S.items=Array.isArray(payload.items)?payload.items:[];
  S.closeKey=payload.close_key||S.closeKey;
  S.emptySub=payload.empty_subtitle||S.emptySub;
  if(payload.subtitle) document.getElementById('subtitle').textContent=payload.subtitle;
  document.getElementById('hint').textContent=S.closeKey+' pour fermer · survol = aperçu';
  document.getElementById('status').textContent='Prêt';
  render();
};
document.addEventListener('DOMContentLoaded',function(){wire();gmodCall('anim_ui','pageReady');});
</script>
</body>
</html>
