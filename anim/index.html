<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c69643;
  --gold-dim:rgba(198,150,67,0.18);
  --gold-border:rgba(198,150,67,0.30);
  --silver:#c8cbd6;
  --silver-dim:rgba(200,203,214,0.10);
  --text:#f0f0f5;
  --dim:#8a8e9a;
  --bg:#07080c;
  --panel:rgba(14,15,20,0.97);
  --border:rgba(255,255,255,0.07);
  --border-hover:rgba(255,255,255,0.14);
  --success:#4ade80;
  --danger:#ff6060;
  --scrollbar:rgba(255,255,255,0.08);
}
html,body{
  width:100%;height:100%;
  font-family:'Rajdhani',sans-serif;
  background:transparent;
  color:var(--text);
  overflow:hidden;
}

/* ── LAYOUT ── */
#root{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
}
#panel{
  width:min(780px,96vw);
  height:min(720px,94vh);
  display:flex;flex-direction:column;
  background:var(--panel);
  border:1px solid var(--border);
  border-top:1px solid rgba(255,255,255,0.11);
  border-radius:4px;
  box-shadow:0 40px 100px rgba(0,0,0,0.70), 0 0 0 1px rgba(0,0,0,0.5);
  overflow:hidden;
  position:relative;
}

/* corner accent lines */
#panel::before,#panel::after{
  content:'';position:absolute;pointer-events:none;
  background:var(--gold);opacity:0.55;
}
#panel::before{top:0;left:0;width:40px;height:1px}
#panel::after{top:0;left:0;width:1px;height:40px}

/* ── HEADER ── */
#header{
  padding:22px 28px 18px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;
  background:linear-gradient(180deg,rgba(20,18,14,0.60) 0%,transparent 100%);
  flex-shrink:0;
}
#header-left{display:flex;align-items:center;gap:16px}
#icon{
  width:44px;height:44px;border-radius:3px;
  background:var(--gold-dim);
  border:1px solid var(--gold-border);
  display:grid;place-items:center;
  flex-shrink:0;
}
#icon svg{width:20px;height:20px;fill:var(--gold)}
#titles{}
#eyebrow{
  font-size:10px;font-weight:700;letter-spacing:.35em;
  text-transform:uppercase;color:var(--dim);margin-bottom:4px;
}
#title{
  font-size:26px;font-weight:800;letter-spacing:.06em;
  text-transform:uppercase;line-height:1;
  color:var(--text);
}
#subtitle{font-size:13px;color:var(--dim);margin-top:5px;letter-spacing:.02em;max-width:460px;line-height:1.3}
#close-btn{
  appearance:none;border:1px solid var(--border);cursor:pointer;
  background:rgba(255,255,255,0.04);color:var(--dim);
  font:700 12px 'Rajdhani',sans-serif;letter-spacing:.25em;text-transform:uppercase;
  padding:8px 16px;border-radius:3px;flex-shrink:0;margin-top:2px;
  transition:border-color .15s,color .15s;
}
#close-btn:hover{border-color:var(--border-hover);color:var(--text)}

/* ── TOOLBAR ── */
#toolbar{
  padding:14px 28px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
  background:rgba(255,255,255,0.015);
}
#search-wrap{
  flex:1;position:relative;height:40px;
}
#search-wrap svg{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;fill:var(--dim);pointer-events:none;
}
#search{
  width:100%;height:100%;border:1px solid var(--border);outline:none;
  background:rgba(255,255,255,0.03);color:var(--text);
  padding:0 14px 0 40px;
  font:600 15px 'Rajdhani',sans-serif;letter-spacing:.03em;
  border-radius:3px;
  transition:border-color .15s;
}
#search:focus{border-color:rgba(255,255,255,0.15)}
#search::placeholder{color:var(--dim)}
#count-badge{
  font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--dim);white-space:nowrap;flex-shrink:0;
}

/* ── LIST ── */
#list-wrap{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:12px 28px 20px;
}
#list-wrap::-webkit-scrollbar{width:4px}
#list-wrap::-webkit-scrollbar-track{background:transparent}
#list-wrap::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px}

.anim-row{
  display:grid;
  grid-template-columns:28px 1fr auto auto;
  align-items:center;gap:0;
  padding:0 14px;height:52px;
  border:1px solid var(--border);
  border-radius:3px;margin-bottom:6px;
  background:rgba(255,255,255,0.025);
  transition:background .12s,border-color .12s;
  cursor:pointer;
}
.anim-row:hover{background:rgba(255,255,255,0.05);border-color:var(--border-hover)}
.anim-row.playing{
  border-color:var(--gold-border);
  background:rgba(198,150,67,0.07);
}
.anim-num{
  font-size:11px;font-weight:700;letter-spacing:.05em;
  color:var(--dim);text-align:left;padding-right:12px;
}
.anim-info{min-width:0}
.anim-name{
  font-size:16px;font-weight:700;letter-spacing:.03em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.anim-tags{display:flex;gap:6px;margin-top:2px}
.tag{
  font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  padding:2px 7px;border-radius:2px;
}
.tag-premium{color:var(--gold);background:var(--gold-dim);border:1px solid var(--gold-border)}
.tag-fav{color:var(--silver);background:var(--silver-dim);border:1px solid rgba(200,203,214,0.20)}
.row-actions{display:flex;gap:6px;margin-left:14px}
.btn-fav,.btn-play{
  appearance:none;border:0;cursor:pointer;border-radius:3px;
  font:700 12px 'Rajdhani',sans-serif;letter-spacing:.10em;text-transform:uppercase;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,border-color .12s,color .12s;
}
.btn-fav{
  width:36px;height:36px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  color:var(--dim);font-size:16px;
}
.btn-fav:hover{border-color:var(--gold-border);color:var(--gold)}
.btn-fav.active{background:var(--gold-dim);border-color:var(--gold-border);color:var(--gold)}
.btn-play{
  height:36px;padding:0 16px;
  background:rgba(198,150,67,0.12);
  border:1px solid var(--gold-border);
  color:var(--gold);font-size:13px;
}
.btn-play:hover{background:rgba(198,150,67,0.22);border-color:rgba(198,150,67,0.50)}

/* ── EMPTY ── */
#empty{
  display:none;text-align:center;padding:60px 20px;
}
#empty h3{font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin-bottom:8px}
#empty p{font-size:14px;color:var(--dim);letter-spacing:.02em}

/* ── FOOTER ── */
#footer{
  padding:12px 28px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  background:rgba(255,255,255,0.010);
}
#hint{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--dim)}
#status{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--dim)}
</style>
</head>
<body>
<div id="root">
  <div id="panel">
    <div id="header">
      <div id="header-left">
        <div id="icon">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div id="titles">
          <div id="eyebrow">Genesis Network</div>
          <div id="title">Animations</div>
          <div id="subtitle">Sélectionne une animation pour ton personnage.</div>
        </div>
      </div>
      <button id="close-btn">Fermer</button>
    </div>

    <div id="toolbar">
      <div id="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search" type="text" placeholder="Rechercher une animation...">
      </div>
      <div id="count-badge">0 anims</div>
    </div>

    <div id="list-wrap">
      <div id="list"></div>
      <div id="empty">
        <h3>Aucune animation</h3>
        <p id="empty-sub">Essaie un autre mot-clé.</p>
      </div>
    </div>

    <div id="footer">
      <div id="hint">★ pour ajouter aux favoris</div>
      <div id="status">Prêt</div>
    </div>
  </div>
</div>

<script>
var S = {
  items: [],
  search: '',
  emptyTitle: 'Aucune animation',
  emptySub: 'Essaie un autre mot-clé.',
  closeKey: 'F7',
};

function gmodCall(ns, fn) {
  var args = Array.prototype.slice.call(arguments, 2);
  try {
    var obj = window[ns] || (window.gmod && window.gmod[ns]);
    if (obj && typeof obj[fn] === 'function') obj[fn].apply(null, args);
  } catch(e){}
}

function esc(v) {
  return String(v == null ? '' : v)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function getFiltered() {
  var q = (S.search || '').trim().toLowerCase();
  var out = S.items.slice();
  if (q) out = out.filter(function(it) {
    return (it.search || (it.name + ' ' + it.key)).toLowerCase().indexOf(q) >= 0;
  });
  out.sort(function(a, b) {
    var fa = a.favorite ? 1 : 0, fb = b.favorite ? 1 : 0;
    if (fa !== fb) return fb - fa;
    return (Number(a.id)||0) - (Number(b.id)||0);
  });
  return out;
}

function render() {
  var items = getFiltered();
  var list = document.getElementById('list');
  var empty = document.getElementById('empty');
  var badge = document.getElementById('count-badge');
  badge.textContent = items.length + ' anim' + (items.length > 1 ? 's' : '');
  if (!items.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    document.getElementById('empty-sub').textContent = S.emptySub;
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = items.map(function(it, i) {
    var tags = '';
    if (it.premium) tags += '<span class="tag tag-premium">Premium</span>';
    if (it.favorite) tags += '<span class="tag tag-fav">Favori</span>';
    return '<div class="anim-row" data-key="'+esc(it.key)+'">'
      + '<div class="anim-num">'+(i+1)+'</div>'
      + '<div class="anim-info">'
        + '<div class="anim-name">'+esc(it.name)+'</div>'
        + (tags ? '<div class="anim-tags">'+tags+'</div>' : '')
      + '</div>'
      + '<div class="row-actions">'
        + '<button class="btn-fav'+(it.favorite?' active':'')+'" data-action="fav" data-key="'+esc(it.key)+'">★</button>'
        + '<button class="btn-play" data-action="play" data-key="'+esc(it.key)+'">JOUER</button>'
      + '</div>'
    + '</div>';
  }).join('');
}

function wire() {
  document.getElementById('close-btn').onclick = function() {
    gmodCall('anim_ui','closeMenu');
  };
  document.getElementById('search').oninput = function(e) {
    S.search = e.target.value || '';
    render();
  };
  document.getElementById('list').addEventListener('click', function(e) {
    var btn = e.target.closest('[data-action]');
    if (!btn) return;
    var key = btn.dataset.key || '';
    if (!key) return;
    if (btn.dataset.action === 'fav') {
      var it = S.items.find(function(x){ return String(x.key) === String(key); });
      if (!it) return;
      it.favorite = !it.favorite;
      render();
      gmodCall('anim_ui','toggleFavorite', key, it.favorite ? '1' : '0');
    } else if (btn.dataset.action === 'play') {
      gmodCall('anim_ui','playAnimation', key);
      document.getElementById('status').textContent = 'Lecture…';
    }
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') gmodCall('anim_ui','closeMenu');
  });
}

window.GA_Bootstrap = function(payload) {
  if (!payload) return;
  S.items = Array.isArray(payload.items) ? payload.items : [];
  S.closeKey = payload.close_key || S.closeKey;
  S.emptySub = payload.empty_subtitle || S.emptySub;
  if (payload.subtitle) document.getElementById('subtitle').textContent = payload.subtitle;
  document.getElementById('hint').textContent = S.closeKey + ' pour fermer';
  document.getElementById('status').textContent = 'Prêt';
  render();
};

document.addEventListener('DOMContentLoaded', function() {
  wire();
  gmodCall('anim_ui','pageReady');
});
</script>
</body>
</html>
